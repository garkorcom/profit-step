<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<title>EasyTimerCost — Call summary</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<script src="meta.js"></script>
<script src="shell.js"></script>
<script>
const params = new URLSearchParams(location.search);
const cid = params.get('id') || 'c1';
const c = clientById(cid);
const intel = getClientIntel(cid);

renderShell({
  active: 'call-summary',
  breadcrumbs: [
    { label: 'Dashboard', href: 'index.html' },
    { label: 'Call brief', href: `call-brief.html?id=${cid}` },
    { label: 'Summary' }
  ],
});

// Data generated by AI after call
const callData = {
  duration: '7:23',
  endedAt: '2026-04-20 14:47',
  sentiment: { label: 'positive', score: 82, tone: 'дружелюбный, конструктивный' },
  talkRatio: { me: 42, client: 58 },
  outcome: 'advance',  // advance | neutral | regression
  keyTopics: [
    { topic: 'Phase 2 completion', sentiment: 'positive', mentions: 3 },
    { topic: 'Invoice overage (CO-3)', sentiment: 'neutral', mentions: 2 },
    { topic: 'Bath reno upsell', sentiment: 'very-positive', mentions: 4 },
    { topic: 'Crew availability', sentiment: 'neutral', mentions: 2 },
  ],
  summary: [
    'John (Acme) позвонил для check-in по Phase 2 — получил подтверждение May 15 completion.',
    'Объяснена причина overage в last invoice: $425 permits + $1,200 CO-3 (оба подписаны 8 апреля). Принял без вопросов.',
    '⚡ <strong>Sales signal:</strong> John спросил про bath reno в июне — intent высокий. Ты пообещал проверить crew schedule и вернуться сегодня.',
    'Не упомянул rate bump (+8%) — правильно, не было триггера. AI recommend: внести в proposal.',
  ],
  commitments: [
    {
      who: 'me', what: 'Phase 2 completion by May 15',
      status: 'tracked', detail: 'AI добавил milestone в project timeline · slip alert если >3 дня отставания'
    },
    {
      who: 'me', what: 'Confirm crew schedule for bath reno (June)',
      status: 'pending', detail: 'AI нашёл: Роман free after June 10 · нужно подтвердить Денису в течение 4ч',
      due: 'Сегодня 18:00'
    },
    {
      who: 'me', what: 'Send formal bath reno proposal',
      status: 'task-created', detail: 'AI уже drafted (38% margin · $32k) · ждёт твой review'
    },
    {
      who: 'client', what: 'Sarah (CFO) should sign if >$30k',
      status: 'noted', detail: 'AI отметил: копия proposal уйдёт Sarah автоматически'
    },
  ],
  // Auto-generated tasks from commitments
  autoTasks: [
    {
      task: '📋 Review bath reno proposal draft (AI написал)',
      who: 'w1', whoName: 'Денис Х.', priority: 'high',
      due: '2026-04-20 18:00', eta: '15 мин',
      ai_did: 'Draft готов · margin math ок · photos подобраны'
    },
    {
      task: '📅 Site-visit: Михаил → Acme (bath reno)',
      who: 'w2', whoName: 'Михаил М.', priority: 'high',
      due: '2026-04-27 08:00', eta: '2 часа + travel',
      ai_did: 'Calendar check: Михаил free · напоминание отправлено · тур route в Google Maps'
    },
    {
      task: '📧 Send bath reno proposal email (после ревью)',
      who: 'a-sys-comms', whoName: 'AI comms bot', priority: 'med',
      due: '2026-04-20 20:00', eta: 'auto',
      ai_did: 'Email draft ready · CC: Sarah (CFO) · attachment: portfolio 3 bath renos'
    },
    {
      task: '💳 Check outstanding invoice #INV-044 ($12k, 18д overdue)',
      who: 'bookkeeper', whoName: 'Bookkeeper', priority: 'med',
      due: '2026-04-21 12:00', eta: '10 мин',
      ai_did: 'Gentle reminder email drafted · не упоминай во время bath reno deals'
    },
    {
      task: '📞 Follow-up call · touch base',
      who: 'w1', whoName: 'Денис Х.', priority: 'low',
      due: '2026-04-23 15:00', eta: '15 мин',
      ai_did: 'Calendar block · AI подготовит mini-brief за 30 мин до звонка'
    },
  ],
  recordUpdates: [
    { field: 'Stakeholders', was: '3 people', now: '3 people + Sarah marked as approver >$30k', type: 'update' },
    { field: 'Opportunities', was: 'Bath reno · 72% prob', now: 'Bath reno · <strong>85% prob</strong> (signal сегодня)', type: 'update' },
    { field: 'Hot buttons', was: 'On-time, quality photos, clear CO', now: '+ <strong>Crew availability flexibility</strong>', type: 'add' },
    { field: 'Health score', was: '84', now: '<strong>87</strong> (+3 · positive sentiment)', type: 'update' },
    { field: 'Last contact', was: '2026-04-19 email', now: '<strong>2026-04-20 call 7:23</strong>', type: 'update' },
  ],
  revenueImpact: {
    before: { pipeline: 112000, probability: 64 },
    after:  { pipeline: 112000, probability: 78 },
    unlocked: 27200,  // expected value bump: $32k * (85% - 72%) ≈ additional EV
  }
};

const sentBg = callData.sentiment.label === 'positive' ? 'linear-gradient(135deg,#1565c0,#42a5f5)' : 'linear-gradient(135deg,#37474f,#607d8b)';
const outcomeIcon = callData.outcome === 'advance' ? '📈' : callData.outcome === 'neutral' ? '➡' : '📉';
const outcomeLabel = callData.outcome === 'advance' ? 'Deal advanced' : callData.outcome === 'neutral' ? 'No change' : 'Regression';

setBody(`
  <!-- Top banner -->
  <div style="background:${sentBg};color:#fff;border-radius:var(--radius);padding:16px 24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;box-shadow:var(--shadow-md)">
    <div style="font-size:32px">✓</div>
    <div style="flex:1">
      <div style="opacity:0.85;font-size:11px;text-transform:uppercase;letter-spacing:0.5px">Звонок завершён · ${callData.endedAt}</div>
      <div style="font-size:18px;font-weight:700;margin-top:2px">${intel.contact.name} · ${c.name}</div>
      <div style="opacity:0.85;font-size:13px;margin-top:2px">⏱ ${callData.duration} · ${outcomeIcon} ${outcomeLabel} · sentiment ${callData.sentiment.score}/100</div>
    </div>
    <a href="call-brief.html?id=${cid}" class="btn" style="background:rgba(255,255,255,0.2);color:#fff;border-color:rgba(255,255,255,0.3)">📄 Brief</a>
    <button class="btn" style="background:#fff;color:var(--primary);border:0;font-weight:700">🎧 Listen · transcript</button>
  </div>

  <!-- AI status -->
  <div class="ai-card" style="margin-bottom:20px;display:flex;align-items:center;gap:16px;padding:14px 18px">
    <div class="agent-avatar">🤖</div>
    <div style="flex:1">
      <div class="strong">AI обработал звонок за 3.2 сек</div>
      <div class="small muted">Transcript · sentiment · commitments · ${callData.autoTasks.length} tasks drafted · client record updated · revenue impact computed</div>
    </div>
    <span class="chip ai">🤖 post-call pipeline</span>
  </div>

  <!-- KPIs: outcome -->
  <div class="kpi-grid">
    <div class="kpi success">
      <div class="kpi-label">Sentiment</div>
      <div class="kpi-value">${callData.sentiment.score}<span style="font-size:14px;color:var(--text-3)">/100</span></div>
      <div class="kpi-sub">${callData.sentiment.tone}</div>
    </div>
    <div class="kpi primary">
      <div class="kpi-label">Talk ratio</div>
      <div class="kpi-value">${callData.talkRatio.me}/${callData.talkRatio.client}</div>
      <div class="kpi-sub">me/client · ✓ healthy (<50/50 rule)</div>
    </div>
    <div class="kpi warning">
      <div class="kpi-label">Commitments</div>
      <div class="kpi-value">${callData.commitments.length}</div>
      <div class="kpi-sub">${callData.commitments.filter(c=>c.who==='me').length} на тебе · ${callData.commitments.filter(c=>c.who==='client').length} на клиенте</div>
    </div>
    <div class="kpi success">
      <div class="kpi-label">💰 Revenue unlocked</div>
      <div class="kpi-value">+${fmt$(callData.revenueImpact.unlocked)}</div>
      <div class="kpi-sub">EV bump от bath reno signal</div>
    </div>
  </div>

  <!-- Section: AI summary -->
  <div class="ai-card" style="margin-bottom:20px">
    <div class="ai-card-header">
      <div class="agent-avatar">🤖</div>
      <div style="flex:1">
        <div class="strong">AI-сводка разговора</div>
        <div class="small muted">ключевые моменты · топ сигналы · risk flags</div>
      </div>
      <span class="chip ai">4 key points</span>
    </div>
    <div class="ai-reason">
      <ul style="margin:0;padding-left:20px;color:var(--text);line-height:1.8;font-size:13px">
        ${callData.summary.map(s => `<li style="margin-bottom:6px">${s}</li>`).join('')}
      </ul>
    </div>

    <!-- Key topics chips -->
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
      <div class="small muted" style="margin-bottom:8px">Темы разговора</div>
      <div class="row" style="gap:6px;flex-wrap:wrap">
        ${callData.keyTopics.map(t => {
          const chip = t.sentiment === 'very-positive' ? 'success' : t.sentiment === 'positive' ? 'success' : t.sentiment === 'negative' ? 'error' : '';
          const ic = t.sentiment === 'very-positive' ? '🔥' : t.sentiment === 'positive' ? '✓' : t.sentiment === 'negative' ? '⚠' : '●';
          return `<span class="chip ${chip}">${ic} ${t.topic} · ×${t.mentions}</span>`;
        }).join('')}
      </div>
    </div>
  </div>

  <div class="grid-2" style="align-items:flex-start;gap:20px">
    <!-- LEFT: Commitments -->
    <div class="stack">
      <div class="card">
        <div class="card-header">
          <h3>🤝 Commitments made</h3>
          <span class="chip ai">🤖 tracked</span>
        </div>
        <div class="card-body">
          <div class="trail">
            ${callData.commitments.map(cm => {
              const dot = cm.status === 'tracked' ? 'success' : cm.status === 'pending' ? 'warning' : cm.status === 'task-created' ? 'ai' : '';
              const statusChip = cm.status === 'tracked' ? '<span class="chip success">✓ tracked</span>'
                              : cm.status === 'pending' ? '<span class="chip warning">⏳ pending</span>'
                              : cm.status === 'task-created' ? '<span class="chip ai">🤖 task created</span>'
                              : '<span class="chip">📝 noted</span>';
              const whoLabel = cm.who === 'me' ? '👤 Ты пообещал' : cm.who === 'client' ? '🏢 Клиент' : '📝 Заметка';
              return `
                <div class="trail-item">
                  <div class="trail-dot ${dot}"></div>
                  <div class="trail-content">
                    <div class="row spread">
                      <div class="who">${whoLabel}: ${cm.what}</div>
                      ${statusChip}
                    </div>
                    <div class="what">${cm.detail}</div>
                    ${cm.due ? `<div class="when">⏰ Deadline: ${cm.due}</div>` : ''}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>

      <!-- Revenue impact -->
      <div class="ai-card">
        <div class="ai-card-header">
          <div class="agent-avatar sm">💰</div>
          <div class="strong">Revenue impact · до/после звонка</div>
        </div>
        <div style="display:flex;gap:16px;margin-top:6px">
          <div style="flex:1;padding:14px;background:#fff;border:1px solid var(--border);border-radius:var(--radius)">
            <div class="small muted">ДО звонка</div>
            <div style="font-size:24px;font-weight:700;margin-top:4px">${fmt$(callData.revenueImpact.before.pipeline)}</div>
            <div class="small muted">Probability ${callData.revenueImpact.before.probability}%</div>
          </div>
          <div style="display:flex;align-items:center;font-size:24px;color:var(--success)">→</div>
          <div style="flex:1;padding:14px;background:var(--success-50);border:1px solid var(--success-100);border-radius:var(--radius)">
            <div class="small muted">ПОСЛЕ звонка</div>
            <div style="font-size:24px;font-weight:700;margin-top:4px;color:var(--success)">${fmt$(callData.revenueImpact.after.pipeline)}</div>
            <div class="small" style="color:var(--success)">Probability <strong>${callData.revenueImpact.after.probability}%</strong> (+14pp)</div>
          </div>
        </div>
        <div class="ai-reason" style="margin-top:12px">
          <div class="small"><strong>AI analysis:</strong> John сам inicировал bath reno — это buying signal уровня 8/10. Historically такие звонки конвертируются в 78% случаев (vs baseline 45% для cold upsells).</div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Auto-tasks + record updates -->
    <div class="stack">
      <!-- Auto-generated tasks -->
      <div class="ai-card">
        <div class="ai-card-header">
          <div class="agent-avatar">📋</div>
          <div style="flex:1">
            <div class="strong">Auto-tasks · готовы к approve</div>
            <div class="small muted">AI распределил по исполнителям · проверь и одобри</div>
          </div>
          <span class="chip ai">${callData.autoTasks.length} задач</span>
        </div>
        <table class="table" style="margin:6px -4px 0">
          <thead><tr><th>Задача</th><th>Кому</th><th>До</th><th></th></tr></thead>
          <tbody>
            ${callData.autoTasks.map(t => {
              const pChip = t.priority === 'high' ? 'error' : t.priority === 'med' ? 'warning' : '';
              const isAgent = t.who.startsWith('a-');
              const who = isAgent
                ? { name: t.whoName, initials: '🤖', isAgent: true }
                : t.who === 'bookkeeper' ? { name: 'Bookkeeper', initials: 'BK' } : workerById(t.who);
              const avatar = isAgent
                ? `<div class="agent-avatar sm">🤖</div>`
                : `<div class="avatar sm">${who.initials}</div>`;
              return `
                <tr>
                  <td>
                    <div class="strong small">${t.task}</div>
                    <div class="small muted" style="margin-top:2px">🤖 ${t.ai_did}</div>
                    <div class="small" style="margin-top:2px"><span class="chip ${pChip}">${t.priority}</span> <span class="muted">· eta ${t.eta}</span></div>
                  </td>
                  <td><div class="row" style="gap:6px">${avatar}<span class="small strong">${who.name}</span></div></td>
                  <td class="small muted" style="white-space:nowrap">${t.due}</td>
                  <td><button class="btn sm" style="background:var(--success);color:#fff;border:0">✓ Approve</button></td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
        <div class="row" style="gap:8px;margin-top:10px">
          <button class="btn primary">✓ Approve all · create ${callData.autoTasks.length} tasks</button>
          <button class="btn">Edit</button>
        </div>
      </div>

      <!-- Client record updates -->
      <div class="card">
        <div class="card-header">
          <h3>📂 Обновления в карточке клиента</h3>
          <span class="chip ai">🤖 AI pre-filled</span>
        </div>
        <div class="card-body">
          <div style="display:flex;flex-direction:column;gap:10px">
            ${callData.recordUpdates.map(u => {
              const ic = u.type === 'add' ? '➕' : '✏';
              return `
                <div style="padding:10px 12px;background:var(--bg);border-radius:var(--radius);border-left:3px solid var(--ai)">
                  <div class="small muted">${ic} ${u.field}</div>
                  <div class="small" style="margin-top:4px">
                    <span class="muted">было:</span> ${u.was}
                  </div>
                  <div class="small" style="margin-top:2px;color:var(--ai-600)">
                    <span class="muted" style="color:var(--text-3)">стало:</span> ${u.now}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="row" style="gap:8px;margin-top:14px">
            <button class="btn primary">✓ Apply all</button>
            <button class="btn sm">Review каждое</button>
          </div>
        </div>
      </div>

      <!-- Follow-up cadence -->
      <div class="ai-card">
        <div class="ai-card-header">
          <div class="agent-avatar sm">🔄</div>
          <div class="strong">Cadence · что дальше</div>
        </div>
        <div class="ai-reason">
          <div class="trail" style="margin:0">
            <div class="trail-item">
              <div class="trail-dot success"></div>
              <div class="trail-content">
                <div class="who">Сегодня 18:00</div>
                <div class="what">Вернуться с подтверждением crew schedule · SMS или email</div>
              </div>
            </div>
            <div class="trail-item">
              <div class="trail-dot ai"></div>
              <div class="trail-content">
                <div class="who">2026-04-22 10:00</div>
                <div class="what">Send bath reno proposal (после твоего ревью)</div>
              </div>
            </div>
            <div class="trail-item">
              <div class="trail-dot ai"></div>
              <div class="trail-content">
                <div class="who">2026-04-23 15:00</div>
                <div class="what">Follow-up call · touch base · AI напомнит</div>
              </div>
            </div>
            <div class="trail-item">
              <div class="trail-dot"></div>
              <div class="trail-content">
                <div class="who">2026-04-27 08:00</div>
                <div class="what">Site-visit Михаила · bath reno scope</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom actions -->
  <div class="card" style="margin-top:20px">
    <div class="card-body" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div style="flex:1;min-width:240px">
        <div class="strong">Готов закрыть summary?</div>
        <div class="small muted">AI применит обновления, создаст задачи и уведомит исполнителей</div>
      </div>
      <button class="btn">🎧 Rewatch transcript</button>
      <button class="btn">📤 Share summary · team</button>
      <a href="call-brief.html?id=${cid}" class="btn">📄 Back to brief</a>
      <button class="btn primary" style="background:var(--success);border-color:var(--success)">✓ Apply all · close call</button>
    </div>
  </div>
`);

mountSelfDocs('call-summary');
</script>
</body>
</html>
