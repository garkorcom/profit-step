name: Python SDK

on:
  push:
    branches: [main]
    paths: ['sdk/python/**']
    tags: ['sdk-v*']
  pull_request:
    paths: ['sdk/python/**']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - name: Install
        run: pip install -e '.[dev]'
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (pytest)
        run: pytest --cov=profit_step_agent --cov-report=term-missing
      - name: Build distribution
        run: python -m build --sdist --wheel
      - name: Smoke install from built wheel
        run: |
          python -m venv /tmp/smoke && \
          /tmp/smoke/bin/pip install dist/*.whl && \
          /tmp/smoke/bin/python -c "import profit_step_agent; print(profit_step_agent.__version__)"

  publish:
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build distribution
        run: |
          pip install build
          python -m build --sdist --wheel
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
