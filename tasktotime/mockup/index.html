  <!-- Локальные стили: tabular-nums для таймеров, мелкие правки -->
  <style>
    body { font-feature-settings: 'tnum' on, 'lnum' on; }
    .tabnum { font-variant-numeric: tabular-nums; }
    /* Кастомный scrollbar для тёмной темы */
    .scroll-thin::-webkit-scrollbar { height: 8px; width: 8px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.4); border-radius: 4px; }
    .scroll-thin::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.7); }

    /* Drawer slide-in анимация */
    .drawer-enter { transform: translateX(100%); }
    .drawer-active { transform: translateX(0); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); }

    /* Карта Tampa: фейковый фон с дорогами и водой */
    .tampa-map {
      background:
        radial-gradient(ellipse at 18% 35%, rgba(56,189,248,0.35) 0%, rgba(56,189,248,0) 32%),
        radial-gradient(ellipse at 82% 78%, rgba(34,197,94,0.18) 0%, rgba(34,197,94,0) 35%),
        repeating-linear-gradient(45deg,  rgba(148,163,184,0.18) 0 1px, transparent 1px 60px),
        repeating-linear-gradient(-45deg, rgba(148,163,184,0.18) 0 1px, transparent 1px 80px),
        linear-gradient(135deg, #e2e8f0 0%, #f1f5f9 100%);
    }
    .dark .tampa-map {
      background:
        radial-gradient(ellipse at 18% 35%, rgba(56,189,248,0.18) 0%, rgba(56,189,248,0) 32%),
        radial-gradient(ellipse at 82% 78%, rgba(34,197,94,0.10) 0%, rgba(34,197,94,0) 35%),
        repeating-linear-gradient(45deg,  rgba(148,163,184,0.06) 0 1px, transparent 1px 60px),
        repeating-linear-gradient(-45deg, rgba(148,163,184,0.06) 0 1px, transparent 1px 80px),
        linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    }

    /* Active task pulse рамка */
    .active-glow {
      box-shadow: 0 0 0 0 rgba(16,185,129,0.55);
      animation: pulseGlow 2s ease-in-out infinite;
    }

    /* Tab active underline */
    .tab-active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: #4F46E5;
      border-radius: 2px;
    }

    /* Drag affordance для dispatch board (visual only) */
    .drag-handle:hover { cursor: grab; }
    .drag-handle:active { cursor: grabbing; }

    /* hide scrollbar в горизонтальной полосе таб-навигации на mobile */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { scrollbar-width: none; }

    /* Diagonal stripe pattern для просроченной части actual в Gantt */
    .stripes-overdue {
      background-image: repeating-linear-gradient(
        45deg,
        rgba(244,63,94,0.95) 0,
        rgba(244,63,94,0.95) 4px,
        rgba(244,63,94,0.65) 4px,
        rgba(244,63,94,0.65) 8px
      );
    }
    .stripes-saved {
      background-image: repeating-linear-gradient(
        135deg,
        rgba(16,185,129,0.18) 0,
        rgba(16,185,129,0.18) 4px,
        rgba(16,185,129,0.05) 4px,
        rgba(16,185,129,0.05) 8px
      );
    }

    /* Graph view: pan canvas */
    .graph-canvas { transform-origin: 0 0; transition: transform 0.06s linear; }
    .graph-node {
      transition: transform 0.18s cubic-bezier(0.4,0,0.2,1), box-shadow 0.18s, filter 0.18s;
    }
    .graph-node:hover { transform: scale(1.04); z-index: 30; box-shadow: 0 12px 24px rgba(15,23,42,0.18); }
    .graph-node.critical {
      box-shadow: 0 0 0 2px #f43f5e, 0 0 16px rgba(244,63,94,0.45);
    }
    .graph-node.dim { filter: opacity(0.35) saturate(0.6); }

    /* Tree disclosure rotation */
    .tree-disc { transition: transform 0.18s ease; }
    .tree-disc.open { transform: rotate(90deg); }

    /* Wiki rendered markdown */
    .wiki-md h1 { font-size: 1.35rem; font-weight: 700; margin-top: 0.6rem; margin-bottom: 0.5rem; line-height: 1.25; }
    .wiki-md h2 { font-size: 1.1rem; font-weight: 700; margin-top: 0.85rem; margin-bottom: 0.35rem; padding-bottom: 0.25rem; border-bottom: 1px solid rgba(148,163,184,0.25); }

    .wiki-md p  { font-size: 0.85rem; line-height: 1.55; margin: 0.35rem 0; }
    .wiki-md ul { list-style: disc; padding-left: 1.2rem; font-size: 0.85rem; line-height: 1.55; margin: 0.35rem 0; }
    .wiki-md ol { list-style: decimal; padding-left: 1.2rem; font-size: 0.85rem; line-height: 1.55; margin: 0.35rem 0; }
    .wiki-md li { margin: 0.1rem 0; }
    .wiki-md code { background: rgba(99,102,241,0.12); border-radius: 3px; padding: 1px 5px; font-family: ui-monospace, monospace; font-size: 0.8em; }
    .wiki-md a { color: #4f46e5; text-decoration: underline; }
    .dark .wiki-md a { color: #a5b4fc; }
    .wiki-md hr { border: none; border-top: 1px dashed rgba(148,163,184,0.4); margin: 0.85rem 0; }
    .wiki-md blockquote { border-left: 3px solid #6366f1; padding: 0.3rem 0.7rem; background: rgba(99,102,241,0.06); margin: 0.4rem 0; font-style: italic; font-size: 0.84rem; }

      { id: 'tree',      icon: 'list-tree',        label: 'Дерево',       short: 'Дерево' },
      { id: 'calendar',  icon: 'calendar-days',    label: 'Календарь',    short: 'Календ.' },
      { id: 'ops',       icon: 'activity',         label: 'Кто что делает', short: 'Live Ops' },
      { id: 'dispatch',  icon: 'shuffle',          label: 'Dispatch (PM)', short: 'Dispatch' },
      { id: 'timeline',  icon: 'gantt-chart',      label: 'Timeline',     short: 'Timeline' },
      { id: 'graph',     icon: 'share-2',          label: 'Граф',         short: 'Граф' },
      { id: 'map',       icon: 'map-pin',          label: 'Карта',        short: 'Карта' },
      { id: 'table',     icon: 'table-2',          label: 'Таблица',      short: 'Таблица' },
      { id: 'my',        icon: 'user-circle',      label: 'Мои задачи',   short: 'Мои' },
    ];

    let currentView = 'board';

    function renderTabs() {
      const root = document.getElementById('tabsRoot');
      root.innerHTML = TABS.map(t => `
        <li>
          <button onclick="switchView('${t.id}')"
                  class="relative inline-flex items-center gap-2 whitespace-nowrap px-3 py-3 text-sm font-medium transition-colors
                  ${currentView === t.id
                    ? 'tab-active text-indigo-600 dark:text-indigo-400'
                    : 'text-slate-600 hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100'}">
            <i data-lucide="${t.icon}" class="h-4 w-4"></i>
            <span class="hidden sm:inline">${t.label}</span>
            <span class="sm:hidden">${t.short}</span>
          </button>
        </li>`).join('');
      lucide.createIcons();
    }

    function switchView(view) {
      currentView = view;
      renderTabs();
      renderView();
      window.scrollTo(0, 0);
    }

    function renderView() {
      const root = document.getElementById('mainView');
      switch (currentView) {
        case 'board':    root.innerHTML = renderBoard();    break;
        case 'tree':     root.innerHTML = renderTree();     break;
        case 'calendar': root.innerHTML = renderCalendar(); break;
        case 'ops':      root.innerHTML = renderOps();      break;
        case 'dispatch': root.innerHTML = renderDispatch(); break;
        case 'timeline': root.innerHTML = renderTimeline(); break;
        case 'graph':    root.innerHTML = renderGraph();    break;
        case 'map':      root.innerHTML = renderMap();      break;
        case 'table':    root.innerHTML = renderTable();    break;
        case 'my':       root.innerHTML = renderMy();       break;
      }
      lucide.createIcons();
      // Post-render hooks для интерактивных view (graph pan/zoom, tree disclosure)
      if (currentView === 'graph') initGraphInteractions();
      if (currentView === 'tree')  initTreeInteractions();
    }

    // ─── Theme toggle (dark/light) ──────────────────────────────────
    function toggleTheme() {
      const html = document.documentElement;
      html.classList.toggle('dark');
      try { localStorage.setItem('tt-theme', html.classList.contains('dark') ? 'dark' : 'light'); } catch (e) {}
      lucide.createIcons();
    }

    // ─── Toast ──────────────────────────────────────────────────────
    function showAiSuggestToast(message) {
      const t = document.getElementById('toast');
      const b = document.getElementById('toastBody');
      b.textContent = message || 'AI распределил 8 задач между 5 сотрудниками. Открыть детали?';
      t.classList.remove('hidden');
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => t.classList.add('hidden'), 4500);
    }

    // ─── Drawer (task detail) ───────────────────────────────────────
    function openDrawer(taskId) {
      const t = T(taskId);
      if (!t) return;
      document.getElementById('drawerOverlay').classList.remove('hidden');
      const d = document.getElementById('drawer');
      d.innerHTML = renderDrawer(t);
      d.classList.remove('translate-x-full');
      d.classList.add('translate-x-0');
      lucide.createIcons();
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
      document.getElementById('drawerOverlay').classList.add('hidden');
      const d = document.getElementById('drawer');
      d.classList.add('translate-x-full');
      d.classList.remove('translate-x-0');
      document.body.style.overflow = '';
    }

    // ─── Shared widgets ─────────────────────────────────────────────
    // Аватар сотрудника (круглый цветной с инициалами)
    function renderAvatar(workerId, sizeClass) {
      const w = W(workerId);
      const cls = sizeClass || 'h-7 w-7 text-[11px]';
      if (!w) return `<div class="inline-flex ${cls} items-center justify-center rounded-full bg-slate-300 text-slate-700">?</div>`;
      return `<div class="inline-flex ${cls} items-center justify-center rounded-full font-semibold text-white shadow-sm" style="background:${w.avatar}" title="${w.name}">${w.short}</div>`;
    }

    // Бейдж жизненного цикла
    function renderLifecycleBadge(t, withDot) {
      const c = LC_COLORS[t.lifecycle];
      const dot = withDot ? `<span class="h-1.5 w-1.5 rounded-full ${c.dot}"></span>` : '';
      return `<span class="inline-flex items-center gap-1.5 rounded-md ${c.bg} ${c.text} px-2 py-0.5 text-[11px] font-medium">${dot}${c.label}</span>`;
    }

    // Дот приоритета
    function renderPriorityDot(p) {
      const c = PRIO_COLORS[p];
      return `<span class="inline-block h-2 w-2 rounded-full ${c.dot}" title="${c.label}"></span>`;
    }

    // Карточка задачи на доске (Kanban card)
    function renderTaskCard(t) {
      const isOver = isOverdue(t);
      const isActive = t.timerRunning;
      const dueLabel = fmtDateShort(t.dueAt);
      // Сборка border / outline: active = emerald-glow, overdue = rose, иначе обычный border
      let borderCls = 'border border-slate-200 dark:border-slate-800';
      let extraCls  = '';
      if (isActive) { borderCls = 'border-2 border-emerald-500'; extraCls = 'active-glow'; }
      else if (isOver) borderCls = 'border-2 border-rose-500';

      return `
        <div onclick="openDrawer('${t.id}')"
             class="cursor-pointer rounded-xl bg-white p-3 shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-md dark:bg-slate-900 ${borderCls} ${extraCls}">
          <!-- Header row: priority + code + indicators -->
          <div class="mb-2 flex items-center gap-2">
            ${renderPriorityDot(t.priority)}
            <span class="font-mono text-[10px] text-slate-400">${t.code}</span>
            <div class="ml-auto flex items-center gap-1">
              ${isActive ? `<span class="inline-flex items-center gap-1 rounded-full bg-emerald-100 px-1.5 py-0.5 text-[10px] font-semibold text-emerald-700 dark:bg-emerald-900 dark:text-emerald-300"><span class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-ping absolute"></span><span class="h-1.5 w-1.5 rounded-full bg-emerald-500 relative"></span> LIVE</span>` : ''}
              ${isOver ? `<span class="rounded-full bg-rose-100 px-1.5 py-0.5 text-[10px] font-bold text-rose-700 dark:bg-rose-900 dark:text-rose-300">Просрочена</span>` : ''}
              ${t.atRisk ? `<span class="rounded-full bg-amber-100 px-1.5 py-0.5 text-[10px] font-semibold text-amber-700 dark:bg-amber-900 dark:text-amber-300">Под риском</span>` : ''}
              ${t.lifecycle === 'completed' && !t.acceptance ? `<span class="rounded-full bg-violet-100 px-1.5 py-0.5 text-[10px] font-semibold text-violet-700 dark:bg-violet-900 dark:text-violet-300">Ждёт акт</span>` : ''}
            </div>
          </div>

          <!-- Title -->
          <h3 class="mb-1.5 text-[14px] font-semibold leading-snug text-slate-900 dark:text-slate-100">
            ${t.title}
          </h3>

          <!-- Client/project chips -->
          <div class="mb-2 flex flex-wrap gap-1">
            <span class="inline-flex items-center gap-1 rounded bg-indigo-50 px-1.5 py-0.5 text-[10px] font-medium text-indigo-700 dark:bg-indigo-950 dark:text-indigo-300">
              <i data-lucide="user" class="h-2.5 w-2.5"></i>${t.client}
            </span>
            <span class="inline-flex items-center gap-1 rounded bg-slate-100 px-1.5 py-0.5 text-[10px] font-medium text-slate-700 dark:bg-slate-800 dark:text-slate-300">
              ${t.project}
            </span>
          </div>

          <!-- Meta row 1: assignee + due -->
          <div class="mb-2 flex items-center gap-2">
            ${renderAvatar(t.assignee, 'h-6 w-6 text-[10px]')}
            <span class="text-[12px] font-medium text-slate-700 dark:text-slate-300">${W(t.assignee)?.name.split(' ')[0] || '—'}</span>
            ${t.coAssignees && t.coAssignees.length > 0 ? `<span class="text-[11px] text-slate-500">+${t.coAssignees.length}</span>` : ''}
            ${t.requiredHeadcount > 1 ? `<span class="ml-1 inline-flex items-center gap-0.5 text-[11px] text-slate-500"><i data-lucide="users" class="h-3 w-3"></i>${t.requiredHeadcount}</span>` : ''}
            <span class="ml-auto text-[11px] ${isOver ? 'text-rose-600 font-semibold' : 'text-slate-500'}">${dueLabel}</span>
          </div>

          <!-- Location -->
          ${t.location ? `
            <div class="mb-2 flex items-center gap-1 text-[11px] text-slate-500 dark:text-slate-400">
              <i data-lucide="map-pin" class="h-3 w-3 shrink-0"></i>
              <span class="truncate">${t.location.split(',')[0]}</span>
            </div>` : ''}

          <!-- Bottom row: counters + estimate + money -->
          <div class="mt-2 flex items-center gap-2.5 border-t border-slate-100 pt-2 text-[11px] text-slate-500 dark:border-slate-800 dark:text-slate-400">
            <span class="inline-flex items-center gap-0.5 tabnum"><i data-lucide="clock-3" class="h-3 w-3"></i>${fmtTime(t.estMinutes)}${t.actualMinutes > 0 ? ` / <span class="${t.actualMinutes > t.estMinutes ? 'text-rose-600 font-semibold' : 'text-slate-700 dark:text-slate-300'}">${fmtTime(t.actualMinutes)}</span>` : ''}</span>
            ${t.materials > 0 ? `<span class="inline-flex items-center gap-0.5"><i data-lucide="package" class="h-3 w-3"></i>${t.materials}</span>` : ''}
            ${t.tools > 0 ? `<span class="inline-flex items-center gap-0.5"><i data-lucide="wrench" class="h-3 w-3"></i>${t.tools}</span>` : ''}
            ${t.contacts > 0 ? `<span class="inline-flex items-center gap-0.5"><i data-lucide="phone" class="h-3 w-3"></i>${t.contacts}</span>` : ''}
            ${t.dependsOn && t.dependsOn.length > 0 ? `<span class="inline-flex items-center gap-0.5 text-amber-600"><i data-lucide="link" class="h-3 w-3"></i>${t.dependsOn.length} deps</span>` : ''}
            ${t.priceClient > 0 ? `<span class="ml-auto font-semibold text-emerald-600 dark:text-emerald-400 tabnum">${fmtMoney(t.priceClient)}</span>` : ''}
          </div>

          ${t.bonusOnTime > 0 || t.penaltyOverdue > 0 ? `
            <div class="mt-1.5 flex gap-1">
              ${t.bonusOnTime > 0 ? `<span class="rounded bg-emerald-100 px-1.5 py-0.5 text-[10px] font-semibold text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300">+${fmtMoney(t.bonusOnTime)} вовремя</span>` : ''}
              ${t.penaltyOverdue > 0 ? `<span class="rounded bg-rose-100 px-1.5 py-0.5 text-[10px] font-semibold text-rose-700 dark:bg-rose-950 dark:text-rose-300">−${fmtMoney(t.penaltyOverdue)} опозд.</span>` : ''}
            </div>` : ''}

          ${t.lifecycle === 'blocked' && t.blockReason ? `
            <div class="mt-2 rounded-md bg-amber-50 px-2 py-1.5 text-[11px] text-amber-800 dark:bg-amber-950 dark:text-amber-300">
              <i data-lucide="alert-triangle" class="mr-1 inline h-3 w-3"></i>${t.blockReason}
            </div>` : ''}
        </div>`;
    }

    // ─── BOARD VIEW (GTD Kanban) ────────────────────────────────────
    function renderBoard() {
      const cols = [
        { lc: ['draft'],     bucket: ['inbox'], title: 'Inbox',     color: 'slate' },
        { lc: ['ready'],     bucket: null,      title: 'Готовы',    color: 'blue' },
        { lc: ['started'],   bucket: null,      title: 'В работе',  color: 'emerald' },
        { lc: ['blocked'],   bucket: null,      title: 'Блок',      color: 'amber' },
        { lc: ['completed'], bucket: null,      title: 'Закончены (ждут акт)', color: 'violet' },
        { lc: ['accepted'],  bucket: null,      title: 'Принятые',  color: 'green' },
      ];

      const colMap = {
        slate:   'border-slate-300 dark:border-slate-700  bg-slate-50/40 dark:bg-slate-900/40',
        blue:    'border-blue-300 dark:border-blue-800   bg-blue-50/40 dark:bg-blue-950/40',
        emerald: 'border-emerald-300 dark:border-emerald-800 bg-emerald-50/40 dark:bg-emerald-950/40',
        amber:   'border-amber-300 dark:border-amber-800 bg-amber-50/40 dark:bg-amber-950/40',
        violet:  'border-violet-300 dark:border-violet-800 bg-violet-50/40 dark:bg-violet-950/40',
        green:   'border-green-300 dark:border-green-800 bg-green-50/40 dark:bg-green-950/40',
      };
      const headerColMap = {
        slate:   'text-slate-700 dark:text-slate-200',
        blue:    'text-blue-700 dark:text-blue-300',
        emerald: 'text-emerald-700 dark:text-emerald-300',
        amber:   'text-amber-700 dark:text-amber-300',
        violet:  'text-violet-700 dark:text-violet-300',
        green:   'text-green-700 dark:text-green-300',
      };

      // Filter bar (поиск + чипы)
      const filterBar = `
        <div class="mb-4 flex flex-wrap items-center gap-2">
          <div class="inline-flex rounded-lg border border-slate-200 bg-white p-1 text-xs dark:border-slate-700 dark:bg-slate-900">
            <button class="rounded-md bg-indigo-600 px-3 py-1 font-medium text-white">Все</button>
            <button class="rounded-md px-3 py-1 text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800">Мои</button>
            <button class="rounded-md px-3 py-1 text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800">Команда</button>
          </div>
          <button class="inline-flex items-center gap-1 rounded-lg border border-slate-200 bg-white px-2.5 py-1 text-xs font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800">
            <i data-lucide="user" class="h-3 w-3"></i> Клиент <i data-lucide="chevron-down" class="h-3 w-3"></i>
          </button>
          <button class="inline-flex items-center gap-1 rounded-lg border border-slate-200 bg-white px-2.5 py-1 text-xs font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800">
            <i data-lucide="briefcase" class="h-3 w-3"></i> Проект <i data-lucide="chevron-down" class="h-3 w-3"></i>
          </button>
          <button class="inline-flex items-center gap-1 rounded-lg border border-slate-200 bg-white px-2.5 py-1 text-xs font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800">
            <i data-lucide="flame" class="h-3 w-3"></i> Приоритет <i data-lucide="chevron-down" class="h-3 w-3"></i>
          </button>
          <button class="inline-flex items-center gap-1 rounded-lg border border-slate-200 bg-white px-2.5 py-1 text-xs font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800">
            <i data-lucide="calendar" class="h-3 w-3"></i> Даты <i data-lucide="chevron-down" class="h-3 w-3"></i>
          </button>

          <button onclick="showAiSuggestToast('Quick Add: на каком языке хотите ввести задачу?')"
                  class="ml-auto inline-flex items-center gap-1 rounded-lg bg-indigo-600 px-3 py-1.5 text-xs font-semibold text-white shadow-sm transition-colors hover:bg-indigo-700">
            <i data-lucide="plus" class="h-3.5 w-3.5"></i> Quick Add
          </button>
        </div>`;

      const colsHTML = cols.map(c => {
        const tasks = TASKS.filter(t => c.lc.includes(t.lifecycle) && (!c.bucket || c.bucket.includes(t.bucket)));
        return `
          <div class="flex w-72 shrink-0 flex-col rounded-xl border ${colMap[c.color]} p-3">
            <div class="mb-3 flex items-center justify-between">
              <h2 class="text-sm font-semibold ${headerColMap[c.color]}">${c.title}</h2>
              <span class="rounded-full bg-white/70 px-2 py-0.5 text-[11px] font-semibold text-slate-600 dark:bg-slate-800/80 dark:text-slate-300 tabnum">${tasks.length}</span>
            </div>
            <div class="flex flex-col gap-2.5">
              ${tasks.map(renderTaskCard).join('') || `<div class="rounded-lg border border-dashed border-slate-300 bg-white/50 p-4 text-center text-xs text-slate-400 dark:border-slate-700 dark:bg-slate-900/40">Пусто</div>`}
            </div>
          </div>`;
      }).join('');

      return `
        ${filterBar}
        <div class="flex gap-3 overflow-x-auto pb-4 scroll-thin">
          ${colsHTML}
        </div>`;
    }

    // ─── TREE VIEW (иерархия parent → subtask, 2 уровня) ──────────
    // State для tree view (которые проекты раскрыты + skin filter)
    let treeState = {
      collapsedProjects: new Set(),     // projects which user collapsed
      collapsedParents:  new Set(),     // parent task IDs collapsed
      onlyMine:    false,
      hideDone:    false,
      groupByPhase:false,
    };

    function renderTree() {
      // Группируем root tasks (parentTaskId == null) по проекту
      const rootTasks = TASKS.filter(t => !t.parentTaskId);

      // Применяем фильтры
      let filteredRoots = rootTasks;
      if (treeState.onlyMine) filteredRoots = filteredRoots.filter(t => t.assignee === 'w1' || (t.coAssignees && t.coAssignees.includes('w1')));
      if (treeState.hideDone) filteredRoots = filteredRoots.filter(t => !['accepted','cancelled'].includes(t.lifecycle));

      // Группировка по project (или по phase если переключатель)
      const byGroup = {};
      filteredRoots.forEach(t => {
        const key = treeState.groupByPhase
          ? (t.phase || 'без фазы')
          : `${t.client} · ${t.project}`;
        if (!byGroup[key]) byGroup[key] = [];
        byGroup[key].push(t);
      });

      // Counters (общая статистика)
      const totalRoots   = rootTasks.length;
      const totalSubs    = TASKS.filter(t => t.parentTaskId).length;
      const completedAll = TASKS.filter(t => ['accepted','completed'].includes(t.lifecycle)).length;
      const overdueAll   = TASKS.filter(isOverdue).length;
      const blockedAll   = TASKS.filter(t => t.lifecycle === 'blocked').length;

      // ─── Render одной строки задачи в дереве (с indent + disclosure)
      const renderNode = (t, depth, hasKids) => {
        const isOver = isOverdue(t);
        const isActive = t.timerRunning;
        const lcDot   = LC_COLORS[t.lifecycle].dot;
        const isCollapsed = treeState.collapsedParents.has(t.id);
        const subIds = t.subtaskIds || [];
        const subs = subIds.map(id => T(id)).filter(Boolean);
        const subDone = subs.filter(s => ['accepted','completed'].includes(s.lifecycle)).length;
        const padLeft = 12 + depth * 24;
        const aestActual = `${fmtTime(t.estMinutes)}${t.actualMinutes>0?' / '+fmtTime(t.actualMinutes):''}`;

        return `
          <div class="group flex items-center gap-2 border-b border-slate-100 py-1.5 pr-2 transition-colors hover:bg-indigo-50/40 dark:border-slate-800 dark:hover:bg-indigo-950/20"
               style="padding-left:${padLeft}px">
            ${hasKids
              ? `<button data-tree-toggle="${t.id}"
                          class="tree-disc ${isCollapsed ? '' : 'open'} flex h-4 w-4 shrink-0 items-center justify-center rounded text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700"
                          title="Раскрыть/свернуть">
                  <i data-lucide="chevron-right" class="h-3.5 w-3.5"></i>
                 </button>`
              : `<span class="h-4 w-4 shrink-0"></span>`}
            <span class="h-2 w-2 shrink-0 rounded-full ${lcDot}" title="${LC_COLORS[t.lifecycle].label}"></span>
            <button onclick="openDrawer('${t.id}')"
                    class="min-w-0 flex-1 truncate text-left text-[13px] font-medium ${isOver ? 'text-rose-600' : 'text-slate-800 dark:text-slate-200'} hover:text-indigo-600 dark:hover:text-indigo-400">
              ${isActive ? '<span class="mr-1 inline-block h-1.5 w-1.5 rounded-full bg-emerald-500 align-middle animate-pulse"></span>' : ''}
              ${t.title}
              ${t.isCriticalPath ? '<span class="ml-1.5 rounded bg-rose-100 px-1 text-[9px] font-bold uppercase text-rose-700 dark:bg-rose-950 dark:text-rose-300">CP</span>' : ''}
              ${t.category === 'inspection' ? '<span class="ml-1.5 rounded bg-purple-100 px-1 text-[9px] font-bold uppercase text-purple-700 dark:bg-purple-950 dark:text-purple-300">INSP</span>' : ''}
              ${t.category === 'permit' ? '<span class="ml-1.5 rounded bg-amber-100 px-1 text-[9px] font-bold uppercase text-amber-700 dark:bg-amber-950 dark:text-amber-300">PERM</span>' : ''}
              ${t.category === 'punch' ? '<span class="ml-1.5 rounded bg-orange-100 px-1 text-[9px] font-bold uppercase text-orange-700 dark:bg-orange-950 dark:text-orange-300">PUNCH</span>' : ''}
            </button>
            ${subs.length > 0 ? `<span class="shrink-0 text-[11px] tabnum text-slate-500" title="Готово / всего"><i data-lucide="check-square" class="inline h-3 w-3"></i> ${subDone}/${subs.length}</span>` : ''}
            <span class="hidden sm:inline shrink-0 text-[11px] tabnum text-slate-500" title="Часы: план / факт">${aestActual}</span>
            ${renderAvatar(t.assignee, 'h-5 w-5 text-[9px]')}
            <span class="hidden md:inline shrink-0 rounded px-1.5 py-0.5 text-[10px] font-medium ${isOver ? 'bg-rose-100 text-rose-700 dark:bg-rose-950 dark:text-rose-300' : 'bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-300'}">${fmtDayShort(t.dueAt)}</span>
            <button title="Добавить подзадачу"
                    onclick="event.stopPropagation(); showAiSuggestToast('Добавить подзадачу к «${t.title.replace(/'/g, '')}» (mock)')"
                    class="invisible shrink-0 rounded-md border border-dashed border-indigo-300 px-1.5 py-0.5 text-[10px] font-semibold text-indigo-600 group-hover:visible hover:bg-indigo-50 dark:border-indigo-800 dark:text-indigo-300 dark:hover:bg-indigo-950">
              + Sub
            </button>
          </div>`;
      };

      // ─── Render проекта (collapsible header + nodes)
      const renderProject = (groupKey, tasks) => {
        const isCollapsed = treeState.collapsedProjects.has(groupKey);
        const total = tasks.length;
        const done  = tasks.filter(t => ['accepted','completed'].includes(t.lifecycle)).length;
        const subTotal = tasks.reduce((s, t) => s + ((t.subtaskIds || []).length), 0);

        // Все nodes этого проекта (root + visible subtasks)
        let nodesHTML = '';
        if (!isCollapsed) {
          tasks.forEach(t => {
            const subs = (t.subtaskIds || []).map(id => T(id)).filter(Boolean);
            nodesHTML += renderNode(t, 0, subs.length > 0);
            if (subs.length > 0 && !treeState.collapsedParents.has(t.id)) {
              subs.forEach(s => {
                nodesHTML += renderNode(s, 1, false);
              });
            }
          });
        }

        return `
          <div class="overflow-hidden rounded-xl border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
            <button data-tree-toggle-project="${encodeURIComponent(groupKey)}"

            </button>

      const treeBody = Object.entries(byGroup).map(([key, tasks]) => renderProject(key, tasks)).join('') ||

      // ─── Sidebar: counters + filters
      const sidebar = `

                <div class="text-lg font-bold tabnum">${totalRoots}</div>

              <div class="rounded-lg border border-indigo-200 bg-indigo-50 p-2 dark:border-indigo-800 dark:bg-indigo-950">
                <div class="text-[10px] uppercase tracking-wide text-indigo-700 dark:text-indigo-300">Подзадач</div>
                <div class="text-lg font-bold tabnum text-indigo-700 dark:text-indigo-300">${totalSubs}</div>
              </div>
              <div class="rounded-lg border border-emerald-200 bg-emerald-50 p-2 dark:border-emerald-800 dark:bg-emerald-950">
                <div class="text-[10px] uppercase tracking-wide text-emerald-700 dark:text-emerald-300">Готово</div>
                <div class="text-lg font-bold tabnum text-emerald-700 dark:text-emerald-300">${completedAll}</div>
              </div>
              <div class="rounded-lg border border-rose-200 bg-rose-50 p-2 dark:border-rose-800 dark:bg-rose-950">
                <div class="text-[10px] uppercase tracking-wide text-rose-700 dark:text-rose-300">Просроч.</div>
                <div class="text-lg font-bold tabnum text-rose-700 dark:text-rose-300">${overdueAll}</div>
              </div>
            </div>
            ${blockedAll > 0 ? `<div class="mt-2 rounded-md border border-amber-300 bg-amber-50 px-2 py-1.5 text-[11px] font-medium text-amber-800 dark:border-amber-800 dark:bg-amber-950 dark:text-amber-300"><i data-lucide="alert-triangle" class="inline h-3 w-3"></i> Заблокировано: ${blockedAll}</div>` : ''}

            <div class="mt-4 border-t border-slate-200 pt-3 dark:border-slate-700">
              <h4 class="mb-2 text-xs font-bold uppercase tracking-wide text-slate-500">Фильтры</h4>
              <div class="space-y-2 text-[12px]">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" ${treeState.onlyMine ? 'checked' : ''} class="rounded" data-tree-filter="onlyMine">

                <label class="flex items-center gap-2 cursor-pointer">

            <div class="mt-4 border-t border-slate-200 pt-3 dark:border-slate-700">

                  <i data-lucide="chevrons-down" class="h-3.5 w-3.5"></i> Раскрыть всё
                </button>
                <button onclick="treeCollapseAll()" class="flex w-full items-center gap-2 rounded-md border border-slate-200 px-2 py-1.5 text-[12px] font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800">

                </button>

                <div class="flex items-center gap-1.5"><span class="rounded bg-rose-100 px-1 text-[8px] font-bold text-rose-700">CP</span> Critical path</div>
                <div class="flex items-center gap-1.5"><span class="rounded bg-purple-100 px-1 text-[8px] font-bold text-purple-700">INSP</span> Inspection (milestone)</div>
                <div class="flex items-center gap-1.5"><span class="rounded bg-amber-100 px-1 text-[8px] font-bold text-amber-700">PERM</span> Permit</div>
              </div>

          </div>
        </aside>`;

      const header = `
        <div class="mb-4 flex flex-wrap items-center gap-3">
          <h2 class="text-xl font-bold">Дерево задач <span class="text-sm font-normal text-slate-500">— 2 уровня иерархии (parent → subtask)</span></h2>
          <div class="ml-auto flex items-center gap-2 text-[11px]">
            <span class="text-slate-500">Раскрытых проектов:</span>
            <span class="rounded bg-slate-100 px-2 py-0.5 font-semibold text-slate-700 dark:bg-slate-800 dark:text-slate-300 tabnum">${Object.keys(byGroup).length - treeState.collapsedProjects.size}/${Object.keys(byGroup).length}</span>
          </div>
        </div>`;

      return `
        ${header}
        <div class="flex flex-col gap-4 lg:flex-row">
          <div class="min-w-0 flex-1 space-y-3">${treeBody}</div>
          ${sidebar}
        </div>`;
    }

    // Tree interactivity
    function initTreeInteractions() {
      // disclosure toggles по узлам
      document.querySelectorAll('[data-tree-toggle]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const id = btn.getAttribute('data-tree-toggle');
          if (treeState.collapsedParents.has(id)) treeState.collapsedParents.delete(id);
          else treeState.collapsedParents.add(id);
          renderView();
        };
      });
      // disclosure toggles по группам (проектам)
      document.querySelectorAll('[data-tree-toggle-project]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const key = decodeURIComponent(btn.getAttribute('data-tree-toggle-project'));
          if (treeState.collapsedProjects.has(key)) treeState.collapsedProjects.delete(key);
          else treeState.collapsedProjects.add(key);
          renderView();
        };
      });
      // фильтры
      document.querySelectorAll('[data-tree-filter]').forEach(input => {
        input.onchange = (e) => {
          const key = input.getAttribute('data-tree-filter');
          treeState[key] = input.checked;
          renderView();
        };
      });
    }
    function treeExpandAll() {
      treeState.collapsedProjects.clear();
      treeState.collapsedParents.clear();
      renderView();
    }
    function treeCollapseAll() {
      // свернуть все parent + project headers
      TASKS.filter(t => (t.subtaskIds || []).length > 0).forEach(t => treeState.collapsedParents.add(t.id));
      // collect all project keys
      TASKS.filter(t => !t.parentTaskId).forEach(t => {
        const key = treeState.groupByPhase ? (t.phase || 'без фазы') : `${t.client} · ${t.project}`;
        treeState.collapsedProjects.add(key);
      });
      renderView();
    }

    // ─── CALENDAR VIEW ──────────────────────────────────────────────
    function renderCalendar() {
      // Месяц = апрель 2026. Стартуем с понедельника. 30 дней.
      const monthStart = new Date('2026-04-01T00:00:00-04:00');
      const daysInMonth = 30;
      const startDow = (monthStart.getDay() + 6) % 7; // понедельник = 0
      const cells = [];
      // padding до начала месяца
      for (let i = 0; i < startDow; i++) cells.push({ day: '', ts: null });
      for (let d = 1; d <= daysInMonth; d++) {
        const dt = new Date(2026, 3, d); // месяц 3 = апрель
        cells.push({ day: d, dt, isToday: d === 25 });
      }
      // дополнить до 6 рядов = 42 ячейки
      while (cells.length % 7 !== 0) cells.push({ day: '', ts: null });

      const taskOnDay = (d) => TASKS.filter(t => {
        if (!t.dueAt) return false;
        const tdt = new Date(t.dueAt);
        return tdt.getMonth() === 3 && tdt.getDate() === d && tdt.getFullYear() === 2026;
      });

      const lcStripe = (lc) => ({
        draft:'bg-slate-400', ready:'bg-blue-500', started:'bg-emerald-500',
        blocked:'bg-amber-500', completed:'bg-violet-500', accepted:'bg-green-600', cancelled:'bg-rose-500'
      }[lc]);

      // Backlog задачи без даты (для sidebar)
      const backlog = TASKS.filter(t => !t.plannedStartAt && t.lifecycle !== 'accepted' && t.lifecycle !== 'cancelled');

      // Header & toggles
      const header = `
        <div class="mb-4 flex flex-wrap items-center gap-3">
          <div class="flex items-center gap-2">
            <button class="rounded-lg border border-slate-200 bg-white p-1.5 text-slate-600 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800"><i data-lucide="chevron-left" class="h-4 w-4"></i></button>
            <h2 class="text-lg font-semibold">Апрель 2026</h2>
            <button class="rounded-lg border border-slate-200 bg-white p-1.5 text-slate-600 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800"><i data-lucide="chevron-right" class="h-4 w-4"></i></button>
            <button class="ml-2 rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800">Сегодня</button>
          </div>
          <div class="ml-auto inline-flex rounded-lg border border-slate-200 bg-white p-1 text-xs dark:border-slate-700 dark:bg-slate-900">
            <button class="rounded-md bg-indigo-600 px-3 py-1 font-medium text-white">Месяц</button>
            <button class="rounded-md px-3 py-1 text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800">Неделя</button>
            <button class="rounded-md px-3 py-1 text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800">День</button>
          </div>
        </div>`;

      // Active timer chip над календарём
      const activeTasks = TASKS.filter(t => t.timerRunning);
      const activeStrip = activeTasks.length > 0 ? `
        <div class="mb-4 flex flex-wrap gap-2">
          ${activeTasks.map(t => `
            <button onclick="openDrawer('${t.id}')" class="inline-flex items-center gap-2 rounded-full border-2 border-emerald-500 bg-emerald-50 px-3 py-1 text-xs font-medium text-emerald-800 active-glow dark:bg-emerald-950 dark:text-emerald-200">
              <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
              ${W(t.assignee)?.name.split(' ')[0]} • ${t.title.substring(0, 32)}${t.title.length > 32 ? '…' : ''}
              <span class="tabnum text-emerald-600 dark:text-emerald-400">${fmtTime(t.actualMinutes)}</span>
            </button>`).join('')}
        </div>` : '';

      const dowHeader = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d =>
        `<div class="px-2 py-1.5 text-center text-[11px] font-semibold uppercase text-slate-500 dark:text-slate-400">${d}</div>`
      ).join('');

      const cellsHTML = cells.map(c => {
        if (!c.day) return `<div class="min-h-[110px] rounded-md bg-slate-100/40 dark:bg-slate-900/40"></div>`;
        const tasks = taskOnDay(c.day);
        const isWeekend = c.dt && (c.dt.getDay() === 0 || c.dt.getDay() === 6);
        return `
          <div class="min-h-[110px] rounded-md border border-slate-200 ${isWeekend ? 'bg-slate-50/70 dark:bg-slate-900/60' : 'bg-white dark:bg-slate-900'} ${c.isToday ? 'ring-2 ring-indigo-500' : ''} p-1.5 transition-colors hover:bg-indigo-50/30 dark:border-slate-800 dark:hover:bg-indigo-950/20">
            <div class="mb-1 flex items-center justify-between">
              <span class="text-xs font-semibold ${c.isToday ? 'rounded-full bg-indigo-600 px-1.5 py-0.5 text-white' : 'text-slate-700 dark:text-slate-300'}">${c.day}</span>
              ${tasks.length > 3 ? `<span class="text-[10px] text-slate-400">+${tasks.length - 3}</span>` : ''}
            </div>
            <div class="space-y-1">
              ${tasks.slice(0, 3).map(t => `
                <button onclick="openDrawer('${t.id}')" class="flex w-full items-center gap-1 rounded border-l-2 ${isOverdue(t) ? 'border-rose-500 bg-rose-50 dark:bg-rose-950' : ''} ${!isOverdue(t) ? lcStripe(t.lifecycle).replace('bg-', 'border-') + ' bg-slate-50 dark:bg-slate-800' : ''} px-1.5 py-1 text-left text-[10px] font-medium leading-tight text-slate-700 hover:bg-indigo-100 dark:text-slate-200 dark:hover:bg-indigo-900">
                  ${t.timerRunning ? '<span class="h-1.5 w-1.5 shrink-0 rounded-full bg-emerald-500 animate-pulse"></span>' : ''}
                  <span class="truncate">${t.title}</span>
                </button>`).join('')}
            </div>
          </div>`;
      }).join('');

      // Backlog sidebar
      const backlogSidebar = `
        <aside class="w-full lg:w-72 lg:shrink-0">
          <div class="rounded-xl border border-slate-200 bg-white p-3 dark:border-slate-800 dark:bg-slate-900">
            <h3 class="mb-2 flex items-center gap-2 text-sm font-semibold">
              <i data-lucide="inbox" class="h-4 w-4 text-slate-500"></i>
              Без даты <span class="ml-auto rounded-full bg-slate-100 px-2 py-0.5 text-[11px] font-semibold text-slate-600 dark:bg-slate-800 dark:text-slate-300">${backlog.length}</span>
            </h3>
            <div class="space-y-2">
              ${backlog.map(t => `
                <button onclick="openDrawer('${t.id}')" class="block w-full rounded-lg border border-slate-200 bg-slate-50 p-2 text-left transition-colors hover:bg-indigo-50 dark:border-slate-700 dark:bg-slate-800 dark:hover:bg-indigo-950">
                  <div class="flex items-center gap-1.5">
                    ${renderPriorityDot(t.priority)}
                    <span class="text-[11px] font-medium text-slate-700 dark:text-slate-200 leading-tight">${t.title}</span>
                  </div>
                  <div class="mt-1 text-[10px] text-slate-500">${t.client} • ${fmtTime(t.estMinutes)}</div>
                </button>`).join('')}
            </div>
          </div>
        </aside>`;

      return `
        ${header}
        ${activeStrip}
        <div class="flex flex-col gap-4 lg:flex-row">
          <div class="flex-1 rounded-xl border border-slate-200 bg-white p-3 dark:border-slate-800 dark:bg-slate-900">
            <div class="grid grid-cols-7 gap-1 mb-1">${dowHeader}</div>
            <div class="grid grid-cols-7 gap-1">${cellsHTML}</div>
          </div>
          ${backlogSidebar}
        </div>`;
    }

    // ─── OPS VIEW (Who Does What — LIVE) ────────────────────────────
    function renderOps() {
      // Mock: для каждого worker'а вычислим: текущая задача, часы сегодня, готово/в плане
      const workerStats = WORKERS.map(w => {
        const myTasks = TASKS.filter(t => t.assignee === w.id || (t.coAssignees && t.coAssignees.includes(w.id)));
        const current = myTasks.find(t => t.timerRunning) || null;
        const hoursToday = w.id === 'w1' ? 263 : w.id === 'w2' ? 188 : w.id === 'w3' ? 462 : w.id === 'w4' ? 78 : w.id === 'w5' ? 320 : w.id === 'w6' ? 0 : 0;
        const completedToday = myTasks.filter(t => ['completed','accepted'].includes(t.lifecycle)).length;
        const plannedToday = myTasks.filter(t => t.plannedStartAt && new Date(t.plannedStartAt).getDate() === 25).length;
        return { worker: w, current, hoursToday, completedToday, plannedToday, taskCount: myTasks.length };
      });

      const groups = {
        active:   workerStats.filter(s => s.worker.status === 'active'),
        idle:     workerStats.filter(s => s.worker.status === 'idle'),
        offline:  workerStats.filter(s => s.worker.status === 'offline' || s.worker.status === 'off-duty'),
      };

      const statusDot = (s) => {
        const map = {
          active:   ['bg-emerald-500', 'Активен'],
          idle:     ['bg-amber-500',   'Свободен'],
          offline:  ['bg-rose-500',    'Не на связи'],
          'off-duty':['bg-slate-400',  'Не работает'],
        };
        const [c, l] = map[s] || map['off-duty'];
        return `<span class="inline-flex items-center gap-1.5 text-[11px] font-medium text-slate-700 dark:text-slate-300"><span class="h-2 w-2 rounded-full ${c} ${s === 'active' ? 'animate-pulse' : ''}"></span>${l}</span>`;
      };

      const renderWorkerRow = (s) => {
        const w = s.worker;
        const targetMin = 480; // 8h
        const pct = Math.min(100, Math.round((s.hoursToday / targetMin) * 100));
        const pctColor = pct >= 100 ? 'bg-emerald-500' : pct >= 75 ? 'bg-blue-500' : pct >= 50 ? 'bg-amber-500' : 'bg-slate-400';

        return `
          <div class="rounded-xl border ${s.current ? 'border-emerald-300 dark:border-emerald-800' : 'border-slate-200 dark:border-slate-800'} bg-white p-3 transition-shadow hover:shadow-md dark:bg-slate-900">
            <div class="flex items-start gap-3">
              <!-- Avatar -->
              <div class="relative shrink-0">
                ${renderAvatar(w.id, 'h-10 w-10 text-sm')}
                <span class="absolute -bottom-0.5 -right-0.5 h-3 w-3 rounded-full border-2 border-white dark:border-slate-900 ${w.status === 'active' ? 'bg-emerald-500 animate-pulse' : w.status === 'idle' ? 'bg-amber-500' : w.status === 'offline' ? 'bg-rose-500' : 'bg-slate-400'}"></span>
              </div>

              <div class="min-w-0 flex-1">
                <!-- Name + status + spec -->
                <div class="flex flex-wrap items-center gap-2">
                  <h3 class="text-sm font-semibold text-slate-900 dark:text-slate-100">${w.name}</h3>
                  ${statusDot(w.status)}
                  <span class="rounded bg-slate-100 px-1.5 py-0.5 text-[10px] font-medium text-slate-600 dark:bg-slate-800 dark:text-slate-300">${w.specialty}</span>
                  <span class="ml-auto text-[11px] text-slate-500">📍 ${w.loc}</span>
                </div>

                <!-- Hours bar -->
                <div class="mt-2">
                  <div class="mb-1 flex items-center justify-between text-[11px]">
                    <span class="text-slate-600 dark:text-slate-400">Сегодня: <span class="font-semibold text-slate-900 dark:text-slate-100 tabnum">${fmtTime(s.hoursToday)}</span> / 8h</span>
                    <span class="font-semibold ${pct >= 100 ? 'text-emerald-600' : 'text-slate-500'} tabnum">${pct}%</span>
                  </div>
                  <div class="h-1.5 w-full overflow-hidden rounded-full bg-slate-200 dark:bg-slate-800">
                    <div class="h-full rounded-full ${pctColor} transition-all" style="width:${pct}%"></div>
                  </div>
                </div>

                <!-- Current task (если есть) -->
                ${s.current ? `
                  <div class="mt-2.5 cursor-pointer rounded-lg border-2 border-emerald-500 bg-emerald-50 p-2.5 active-glow dark:bg-emerald-950" onclick="openDrawer('${s.current.id}')">

                      <span class="ml-auto text-[11px] font-bold text-emerald-700 dark:text-emerald-300 tabnum">${fmtTime(s.current.actualMinutes)} / ${fmtTime(s.current.estMinutes)}</span>
                    </div>
                    <div class="mt-1 text-[13px] font-semibold text-slate-900 dark:text-slate-100">${s.current.title}</div>
                    <div class="mt-0.5 text-[11px] text-slate-600 dark:text-slate-400">${s.current.client} • ${s.current.location.split(',')[0]}</div>
                  </div>` : `
                  <div class="mt-2.5 rounded-lg border border-dashed border-slate-300 bg-slate-50 p-2 text-center text-[11px] text-slate-500 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-400">
                    ${w.status === 'active' ? 'Между задачами' : w.status === 'idle' ? 'Ждёт задание' : w.status === 'offline' ? 'Не отвечает' : 'Выходной'}
                  </div>`}

                <!-- Counters -->
                <div class="mt-2.5 flex items-center gap-3 text-[11px]">
                  <span class="inline-flex items-center gap-1 text-emerald-600 dark:text-emerald-400">
                    <i data-lucide="check-circle-2" class="h-3.5 w-3.5"></i>
                    <span class="font-semibold">${s.completedToday}</span> готово
                  </span>
                  <span class="inline-flex items-center gap-1 text-blue-600 dark:text-blue-400">
                    <i data-lucide="calendar-clock" class="h-3.5 w-3.5"></i>
                    <span class="font-semibold">${s.plannedToday}</span> в плане
                  </span>
                  <span class="inline-flex items-center gap-1 text-slate-500 dark:text-slate-400">
                    <i data-lucide="layers" class="h-3.5 w-3.5"></i>
                    <span class="font-semibold">${s.taskCount}</span> всего
                  </span>
                  <button onclick="event.stopPropagation(); showAiSuggestToast('Открываю чат с ${w.name} в Telegram…')"
                          class="ml-auto rounded-md bg-slate-100 px-2 py-1 text-[10px] font-semibold text-slate-700 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
                    <i data-lucide="message-circle" class="inline h-3 w-3"></i> Написать
                  </button>
                </div>
              </div>
            </div>
          </div>`;
      };

      // Header bar — фильтр + сортировка
      const header = `
        <div class="mb-4 flex flex-wrap items-center gap-3">
          <h2 class="text-xl font-bold">Кто что делает <span class="ml-1 inline-block rounded-full bg-emerald-100 px-2 py-0.5 text-xs font-semibold text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300">LIVE</span></h2>
          <div class="ml-2 inline-flex rounded-lg border border-slate-200 bg-white p-1 text-xs dark:border-slate-700 dark:bg-slate-900">
            <button class="rounded-md bg-indigo-600 px-3 py-1 font-medium text-white">Вся компания</button>
            <button class="rounded-md px-3 py-1 text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800">Моя бригада</button>
            <button class="rounded-md px-3 py-1 text-slate-600 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800">По локации</button>
          </div>
          <div class="ml-auto flex items-center gap-2 text-xs text-slate-500">
            Сортировка:
            <select class="rounded-lg border border-slate-200 bg-white px-2 py-1 text-xs dark:border-slate-700 dark:bg-slate-900">
              <option>Часы сегодня</option>
              <option>Эффективность</option>
              <option>По имени</option>
            </select>
          </div>
        </div>

        <!-- Summary chips -->
        <div class="mb-4 grid grid-cols-2 gap-2 sm:grid-cols-4">
          <div class="rounded-xl border border-emerald-200 bg-emerald-50 p-3 dark:border-emerald-900 dark:bg-emerald-950">
            <div class="text-[11px] font-medium text-emerald-700 dark:text-emerald-300">Активны сейчас</div>
            <div class="mt-1 text-2xl font-bold text-emerald-900 dark:text-emerald-100 tabnum">${groups.active.length} <span class="text-sm font-normal text-emerald-600">/ ${WORKERS.length}</span></div>
          </div>
          <div class="rounded-xl border border-amber-200 bg-amber-50 p-3 dark:border-amber-900 dark:bg-amber-950">
            <div class="text-[11px] font-medium text-amber-700 dark:text-amber-300">Свободны</div>
            <div class="mt-1 text-2xl font-bold text-amber-900 dark:text-amber-100 tabnum">${groups.idle.length}</div>
          </div>
          <div class="rounded-xl border border-blue-200 bg-blue-50 p-3 dark:border-blue-900 dark:bg-blue-950">
            <div class="text-[11px] font-medium text-blue-700 dark:text-blue-300">Активных задач</div>
            <div class="mt-1 text-2xl font-bold text-blue-900 dark:text-blue-100 tabnum">${TASKS.filter(t => t.timerRunning).length}</div>
          </div>
          <div class="rounded-xl border border-rose-200 bg-rose-50 p-3 dark:border-rose-900 dark:bg-rose-950">
            <div class="text-[11px] font-medium text-rose-700 dark:text-rose-300">Просрочены</div>
            <div class="mt-1 text-2xl font-bold text-rose-900 dark:text-rose-100 tabnum">${TASKS.filter(isOverdue).length}</div>
          </div>
        </div>`;

      const groupSection = (label, items, defaultOpen) => {
        if (items.length === 0) return '';
        return `
          <details ${defaultOpen ? 'open' : ''} class="mb-5">
            <summary class="mb-2 flex cursor-pointer items-center gap-2 select-none">
              <i data-lucide="chevron-down" class="h-4 w-4 text-slate-500"></i>
