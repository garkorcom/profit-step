              <span class="rounded-full bg-slate-100 px-2 py-0.5 text-[11px] font-semibold text-slate-600 dark:bg-slate-800 dark:text-slate-300">${items.length}</span>
            </summary>
            <div class="grid grid-cols-1 gap-3 lg:grid-cols-2">
              ${items.map(renderWorkerRow).join('')}
            </div>
          </details>`;
      };

      return `
        ${header}
        ${groupSection('🟢 Активны сейчас', groups.active, true)}
        ${groupSection('🟡 Свободны (можно дать задачу)', groups.idle, true)}
        ${groupSection('🔴 Не на связи / выходной', groups.offline, false)}`;
    }

    // ─── DISPATCH BOARD VIEW (PM raspredelenie) ─────────────────────
    function renderDispatch() {
      // Pool = задачи которые надо дораспределить (ready без явного crew assignment)
      // Для демо берём ready+draft+blocked
      const pool = TASKS.filter(t => ['ready','draft','blocked'].includes(t.lifecycle))
                        .sort((a,b) => {
                          const order = { critical: 0, high: 1, medium: 2, low: 3 };
                          return order[a.priority] - order[b.priority];
                        });

      // Группировка пула по приоритету
      const poolGroups = {
        critical: pool.filter(t => t.priority === 'critical'),
        high:     pool.filter(t => t.priority === 'high'),
        medium:   pool.filter(t => t.priority === 'medium'),
        low:      pool.filter(t => t.priority === 'low'),
      };

      // Crew workload — для каждого worker'а: 6h из 8h target
      const crewWorkload = WORKERS.filter(w => w.status !== 'offline' && w.status !== 'off-duty').map(w => {
        const myTodayTasks = TASKS.filter(t =>
          (t.assignee === w.id || (t.coAssignees && t.coAssignees.includes(w.id))) &&
          t.plannedStartAt &&
          new Date(t.plannedStartAt).getDate() === 25
        );
        const totalMin = myTodayTasks.reduce((sum, t) => sum + t.estMinutes, 0);
        return { worker: w, todayTasks: myTodayTasks, totalMin };
      });

      // ─── Header
      const header = `
        <div class="mb-4 flex flex-wrap items-center gap-3">
          <h2 class="text-xl font-bold">Dispatch Board <span class="text-sm font-normal text-slate-500">— раздать задачи на день</span></h2>
          <button onclick="showAiSuggestToast('AI распределил 8 задач между 5 сотрудниками. Открыть детали?')"
                  class="ml-auto inline-flex items-center gap-2 rounded-lg bg-gradient-to-r from-violet-600 to-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-md transition-transform hover:scale-[1.02]">
            <i data-lucide="sparkles" class="h-4 w-4"></i> AI Auto-Dispatch
          </button>
          <button class="inline-flex items-center gap-1.5 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800">
            <i data-lucide="calendar" class="h-4 w-4"></i> Сегодня (25 апр)
          </button>
        </div>`;

      // ─── Pool колонка (left)
      const poolMiniCard = (t) => `
        <div onclick="openDrawer('${t.id}')"
             class="drag-handle cursor-grab rounded-lg border border-slate-200 bg-white p-2.5 transition-all hover:border-indigo-400 hover:shadow-md dark:border-slate-700 dark:bg-slate-900 dark:hover:border-indigo-600">
          <div class="flex items-start gap-2">
            ${renderPriorityDot(t.priority)}
            <div class="min-w-0 flex-1">
              <div class="text-[12px] font-semibold leading-snug text-slate-900 dark:text-slate-100">${t.title}</div>
              <div class="mt-0.5 text-[10px] text-slate-500">${t.client} · ${t.location ? t.location.split(',')[0] : '—'}</div>
              <div class="mt-1.5 flex items-center gap-2 text-[10px] text-slate-500">
                <span class="inline-flex items-center gap-0.5"><i data-lucide="clock-3" class="h-2.5 w-2.5"></i>${fmtTime(t.estMinutes)}</span>
                ${t.materials > 0 ? `<span class="inline-flex items-center gap-0.5"><i data-lucide="package" class="h-2.5 w-2.5"></i>${t.materials}</span>` : ''}
                ${t.requiredHeadcount > 1 ? `<span class="inline-flex items-center gap-0.5"><i data-lucide="users" class="h-2.5 w-2.5"></i>${t.requiredHeadcount}</span>` : ''}
                <span class="ml-auto ${isOverdue(t) ? 'text-rose-600 font-semibold' : ''}">${fmtDayShort(t.dueAt)}</span>
              </div>
            </div>
          </div>
        </div>`;

      const poolGroup = (label, items, color) => {
        if (items.length === 0) return '';
        const colorMap = {
          critical: 'border-rose-300 dark:border-rose-800 bg-rose-50/40 dark:bg-rose-950/30',
          high:     'border-orange-300 dark:border-orange-800 bg-orange-50/40 dark:bg-orange-950/30',
          medium:   'border-sky-300 dark:border-sky-800 bg-sky-50/30 dark:bg-sky-950/30',
          low:      'border-slate-300 dark:border-slate-700 bg-slate-50/40 dark:bg-slate-900/30',
        };
        return `
          <div class="rounded-lg border ${colorMap[color]} p-2.5">
            <div class="mb-2 flex items-center gap-2">
              ${renderPriorityDot(color)}
              <span class="text-[11px] font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300">${label}</span>
              <span class="ml-auto rounded-full bg-white/70 px-2 py-0.5 text-[10px] font-semibold text-slate-600 dark:bg-slate-800/80 dark:text-slate-300">${items.length}</span>
            </div>
            <div class="space-y-2">${items.map(poolMiniCard).join('')}</div>
          </div>`;
      };

      const poolCol = `
        <section class="flex w-full flex-col rounded-xl border border-slate-200 bg-slate-50 p-3 dark:border-slate-800 dark:bg-slate-900/50 lg:w-96 lg:shrink-0">
          <div class="mb-3 flex items-center gap-2">
            <h3 class="text-sm font-semibold text-slate-900 dark:text-slate-100">📥 Pool</h3>
            <span class="rounded-full bg-slate-200 px-2 py-0.5 text-[11px] font-semibold text-slate-700 dark:bg-slate-700 dark:text-slate-200">${pool.length}</span>
            <span class="ml-auto text-[11px] text-slate-500">не назначено / переназначить</span>
          </div>
          <div class="space-y-3">
            ${poolGroup('Critical', poolGroups.critical, 'critical')}
            ${poolGroup('High',     poolGroups.high,     'high')}
            ${poolGroup('Medium',   poolGroups.medium,   'medium')}
            ${poolGroup('Low',      poolGroups.low,      'low')}
          </div>
        </section>`;

      // ─── Crew колонка (right) — workload bars
      const crewRow = (cw) => {
        const w = cw.worker;
        const targetMin = 480;
        const pct = Math.min(100, Math.round((cw.totalMin / targetMin) * 100));
        const barColor = pct > 100 ? 'bg-rose-500' : pct >= 90 ? 'bg-amber-500' : pct >= 60 ? 'bg-emerald-500' : 'bg-blue-500';
        const overload = pct > 100;

        return `
          <details ${cw.todayTasks.length > 0 ? 'open' : ''} class="rounded-lg border ${overload ? 'border-rose-300 dark:border-rose-800' : 'border-slate-200 dark:border-slate-700'} bg-white dark:bg-slate-900">
            <summary class="cursor-pointer list-none p-3 transition-colors hover:bg-slate-50 dark:hover:bg-slate-800">
              <div class="flex items-center gap-3">
                ${renderAvatar(w.id, 'h-9 w-9 text-[12px]')}
                <div class="min-w-0 flex-1">
                  <div class="flex flex-wrap items-center gap-2">
                    <span class="text-sm font-semibold text-slate-900 dark:text-slate-100">${w.name}</span>
                    <span class="rounded bg-slate-100 px-1.5 py-0.5 text-[10px] font-medium text-slate-600 dark:bg-slate-800 dark:text-slate-300">${w.specialty}</span>
                    ${overload ? '<span class="rounded bg-rose-100 px-1.5 py-0.5 text-[10px] font-bold text-rose-700 dark:bg-rose-950 dark:text-rose-300">ПЕРЕГРУЗ</span>' : ''}
                  </div>
                  <div class="mt-1.5">
                    <div class="mb-0.5 flex items-center justify-between text-[10px]">
                      <span class="text-slate-600 dark:text-slate-400">Сегодня <span class="font-semibold tabnum text-slate-900 dark:text-slate-100">${fmtTime(cw.totalMin)}</span> / 8h</span>
                      <span class="font-bold ${overload ? 'text-rose-600' : 'text-slate-600'} tabnum">${pct}%</span>
                    </div>
                    <div class="h-1.5 w-full overflow-hidden rounded-full bg-slate-200 dark:bg-slate-800">
                      <div class="h-full rounded-full ${barColor}" style="width:${Math.min(100, pct)}%"></div>
                    </div>
                  </div>
                </div>
                <i data-lucide="chevron-down" class="h-4 w-4 shrink-0 text-slate-400"></i>
              </div>
            </summary>
            <div class="border-t border-slate-100 p-3 dark:border-slate-800">
              ${cw.todayTasks.length === 0 ? `
                <div class="rounded-lg border-2 border-dashed border-slate-300 bg-slate-50 p-4 text-center text-xs text-slate-500 dark:border-slate-700 dark:bg-slate-800">
                  <i data-lucide="package-plus" class="mx-auto mb-1 h-5 w-5 text-slate-400"></i>
                  Брось сюда задачу из Pool
                </div>` :
                `<div class="space-y-1.5">
                  ${cw.todayTasks.map(t => `
                    <div onclick="openDrawer('${t.id}')" class="flex cursor-pointer items-center gap-2 rounded-md border-l-2 ${t.timerRunning ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-950' : 'border-blue-400 bg-slate-50 dark:bg-slate-800'} px-2 py-1.5 transition-colors hover:bg-indigo-50 dark:hover:bg-indigo-950">
                      ${t.timerRunning ? '<span class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></span>' : renderPriorityDot(t.priority)}
                      <span class="text-[12px] font-medium text-slate-800 dark:text-slate-200 leading-tight truncate">${t.title}</span>
                      <span class="ml-auto shrink-0 text-[10px] tabnum text-slate-500">${fmtTime(t.estMinutes)}</span>
                    </div>`).join('')}
                </div>`}
            </div>
          </details>`;
      };

      const crewCol = `
        <section class="flex w-full flex-col rounded-xl border border-slate-200 bg-slate-50 p-3 dark:border-slate-800 dark:bg-slate-900/50">
          <div class="mb-3 flex items-center gap-2">
            <h3 class="text-sm font-semibold text-slate-900 dark:text-slate-100">👷 Crew</h3>
            <span class="rounded-full bg-slate-200 px-2 py-0.5 text-[11px] font-semibold text-slate-700 dark:bg-slate-700 dark:text-slate-200">${crewWorkload.length}</span>
            <span class="ml-auto text-[11px] text-slate-500">workload на сегодня</span>
          </div>
          <div class="space-y-2">${crewWorkload.map(crewRow).join('')}</div>
          <div class="mt-3 rounded-lg border-2 border-dashed border-indigo-300 bg-indigo-50 p-4 text-center text-xs font-medium text-indigo-700 dark:border-indigo-800 dark:bg-indigo-950 dark:text-indigo-300">
            <i data-lucide="package-plus" class="mx-auto mb-1 h-5 w-5"></i>
            📥 Drop zone: «Новый рабочий день»
          </div>
        </section>`;

      return `
        ${header}
        <div class="flex flex-col gap-4 lg:flex-row">
          ${poolCol}
          <div class="flex-1">${crewCol}</div>
        </div>`;
    }

    // ─── TIMELINE VIEW (Construction Gantt: plan vs actual) ───────────
    // State: toggles + group-by
    let timelineState = {
      showBaseline: true,    // тонкие baseline-полоски (план)
      showCritical: true,    // подсветка critical path
      showDeps:     true,    // SVG стрелки между задачами
      groupBy:      'project',  // none | project | crew | phase
    };

    // Mock weather markers (рейн на 26-27 апреля)
    const TIMELINE_WEATHER = {
      26: { icon: 'cloud-rain', color: 'text-sky-500',  title: 'Дождь, ~80%' },
      27: { icon: 'cloud-rain', color: 'text-sky-500',  title: 'Ливень, ~95%' },
    };

    function renderTimeline() {
      // Дни с 22 по 30 апреля (9 дней)
      const days = [];
      for (let d = 22; d <= 30; d++) days.push({ day: d, dt: new Date(2026, 3, d), isToday: d === 25 });
      const dayWidth = 120; // px per day
      const totalWidth = days.length * dayWidth;

      const lcStripe = (lc) => ({
        draft:'bg-slate-400', ready:'bg-blue-500', started:'bg-emerald-500',
        blocked:'bg-amber-500', completed:'bg-violet-500', accepted:'bg-green-600'
      }[lc] || 'bg-slate-400');

      // ─── Position helpers (учитываем час, не только день) ──
      const dateToX = (iso) => {
        if (!iso) return null;
        const d = new Date(iso);
        if (d.getMonth() !== 3) {
          // Off-screen дата → клипнем к границам
          if (d < new Date(2026, 3, 22)) return 0;
          return totalWidth;
        }
        return Math.max(0, (d.getDate() - 22)) * dayWidth + ((d.getHours() || 0) / 24) * dayWidth;
      };
      const calcPlan = (t) => {
        const start = t.plannedStartAt ? dateToX(t.plannedStartAt) : null;
        const end   = t.plannedEndAt ? dateToX(t.plannedEndAt) : (t.dueAt ? dateToX(t.dueAt) : null);
        if (start === null || end === null) return null;
        return { left: start, width: Math.max(40, end - start), end };
      };
      const calcActual = (t) => {
        if (!t.actualStartAt) return null;
        const start = dateToX(t.actualStartAt);
        const endIso = t.actualEndAt || (t.timerRunning ? NOW.toISOString() : null);
        if (!endIso) return { left: start, width: 12, end: start + 12, ongoing: true };
        const end = dateToX(endIso);
        return { left: start, width: Math.max(20, end - start), end, ongoing: !t.actualEndAt };
      };

      // ─── Header (даты + weather)
      const dateHeader = `
        <div class="sticky top-0 z-30 flex border-b-2 border-slate-300 bg-white shadow-sm dark:border-slate-700 dark:bg-slate-900">
          <div class="w-72 shrink-0 border-r border-slate-200 px-3 py-2 text-xs font-bold uppercase tracking-wide text-slate-700 dark:border-slate-800 dark:text-slate-300">Задача</div>
          <div class="relative flex">
            ${days.map(d => {
              const w = TIMELINE_WEATHER[d.day];
              return `
                <div class="${d.isToday ? 'bg-indigo-50 dark:bg-indigo-950' : ''} shrink-0 border-r border-slate-200 px-2 py-1.5 text-center dark:border-slate-800" style="width:${dayWidth}px">
                  <div class="flex items-center justify-center gap-1">
                    <span class="text-[10px] font-medium uppercase text-slate-500 dark:text-slate-400">${d.dt.toLocaleString('en-US',{weekday:'short'})}</span>
                    ${w ? `<i data-lucide="${w.icon}" class="h-3 w-3 ${w.color}" title="${w.title}"></i>` : ''}
                  </div>
                  <div class="text-sm font-semibold ${d.isToday ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-700 dark:text-slate-200'} tabnum">${d.day}</div>
                </div>`;
            }).join('')}
          </div>
        </div>`;

      // Today line position
      const todayLeft = (25 - 22) * dayWidth + (18.6 / 24) * dayWidth;

      // ─── Группировка задач
      const groupTasks = () => {
        const eligible = TASKS.filter(t => t.plannedStartAt && t.lifecycle !== 'cancelled');
        if (timelineState.groupBy === 'none') return { '': eligible };
        const result = {};
        eligible.forEach(t => {
          let key;
          if (timelineState.groupBy === 'project') key = `${t.client} · ${t.project}`;
          else if (timelineState.groupBy === 'crew') key = W(t.assignee)?.name || '—';
          else if (timelineState.groupBy === 'phase') key = t.phase || 'без фазы';
          else key = '';
          if (!result[key]) result[key] = [];
          result[key].push(t);
        });
        return result;
      };
      const grouped = groupTasks();

      // ─── Render одного task row (двойная полоска: baseline + actual)
      const renderTaskRow = (t) => {
        const plan = calcPlan(t);
        const actual = calcActual(t);
        const isOver = isOverdue(t);
        const isCP = t.isCriticalPath && timelineState.showCritical;
        const isMilestone = t.category === 'inspection' || t.category === 'permit';
        const isPunch = t.category === 'punch';
        const lcCol = {
          draft:'#94a3b8', ready:'#3b82f6', started:'#10b981',
          blocked:'#f59e0b', completed:'#8b5cf6', accepted:'#16a34a'
        }[t.lifecycle] || '#94a3b8';
        const planVar = t.actualMinutes > t.estMinutes && t.estMinutes > 0
          ? `<span class="text-rose-600 font-semibold">+${fmtTime(t.actualMinutes - t.estMinutes)}</span>`
          : (t.actualMinutes > 0 && t.actualMinutes < t.estMinutes
              ? `<span class="text-emerald-600 font-semibold">−${fmtTime(t.estMinutes - t.actualMinutes)}</span>`
              : '');
        const rowHeight = isPunch ? 32 : 56;

        // Plan-vs-actual visual logic
        let actualHTML = '';
        let savedZoneHTML = '';
        let overdueOverlayHTML = '';
        if (actual && plan) {
          // Saved time zone (если actual закончил до plan'а)
          if (actual.end < plan.end && !actual.ongoing) {
            savedZoneHTML = `
              <div class="absolute z-0 stripes-saved rounded-r"
                   style="left:${actual.end}px; width:${plan.end - actual.end}px; top:${(rowHeight-14)/2 - 1}px; height:14px;"
                   title="Saved time: ${fmtTime(Math.round((plan.end - actual.end) / dayWidth * 24 * 60))} раньше плана">
              </div>`;
          }

          if (actual.end > plan.end) {
            // Overdue: actual выходит за plan — split в 2 части
            const planLength = Math.max(0, plan.end - actual.left);
            const overdueLength = actual.end - plan.end;
            actualHTML = `
              <button onclick="openDrawer('${t.id}')"
                      class="group absolute z-10 flex items-center gap-1 rounded-l text-[10px] font-semibold text-white shadow-md transition-transform hover:scale-y-110 ${isCP ? 'ring-2 ring-rose-400' : ''}"
                      style="left:${actual.left}px; width:${planLength}px; top:${(rowHeight-14)/2}px; height:14px; background:${lcCol};"
                      title="${t.title} — actual часть в пределах плана">
                ${actual.ongoing ? '<span class="ml-1 h-1.5 w-1.5 shrink-0 rounded-full bg-white animate-pulse"></span>' : ''}
              </button>
              <button onclick="openDrawer('${t.id}')"
                      class="absolute z-10 stripes-overdue rounded-r shadow-md transition-transform hover:scale-y-110 ring-1 ring-rose-700"
                      style="left:${plan.end}px; width:${overdueLength}px; top:${(rowHeight-14)/2}px; height:14px;"
                      title="OVERDUE на ${fmtTime(Math.round(overdueLength / dayWidth * 24 * 60))}">
              </button>`;
          } else {
            actualHTML = `
              <button onclick="openDrawer('${t.id}')"
                      class="group absolute z-10 flex items-center gap-1 rounded text-[10px] font-semibold text-white shadow-md transition-transform hover:scale-y-110 ${isCP ? 'ring-2 ring-rose-400' : ''} ${actual.ongoing ? 'active-glow' : ''}"
                      style="left:${actual.left}px; width:${actual.width}px; top:${(rowHeight-14)/2}px; height:14px; background:${lcCol};"
                      title="${t.title} — actual">
                ${actual.ongoing ? '<span class="ml-1 h-1.5 w-1.5 shrink-0 rounded-full bg-white animate-pulse"></span>' : ''}
              </button>`;
          }
        } else if (plan && !actual) {
          // План есть, факт ещё не начат — показываем outline-полоску
          actualHTML = `
            <button onclick="openDrawer('${t.id}')"
                    class="absolute z-10 flex items-center justify-center rounded text-[10px] font-semibold transition-all hover:shadow-md ${isCP ? 'ring-2 ring-rose-400' : ''}"
                    style="left:${plan.left}px; width:${plan.width}px; top:${(rowHeight-14)/2}px; height:14px;
                           background: ${lcCol}33; border: 1.5px dashed ${lcCol}; color: ${lcCol};"
                    title="${t.title} — запланировано, ещё не начато">
            </button>`;
        }

        // Baseline тонкая полоска (план) — снизу
        const baselineHTML = (plan && timelineState.showBaseline) ? `
          <div class="absolute z-0 rounded bg-slate-300 dark:bg-slate-600"
               style="left:${plan.left}px; width:${plan.width}px; top:${(rowHeight-14)/2 + 16}px; height:6px;"
               title="План: ${fmtDateShort(t.plannedStartAt)} → ${fmtDateShort(t.plannedEndAt || t.dueAt)}">
          </div>` : '';

        // Milestone diamond (заменяет bar для permit/inspection)
        let milestoneHTML = '';
        if (isMilestone && plan) {
          const x = plan.left + plan.width / 2;
          milestoneHTML = `
            <button onclick="openDrawer('${t.id}')"
                    class="absolute z-20 cursor-pointer transition-transform hover:scale-110"
                    style="left:${x - 12}px; top:${(rowHeight-24)/2}px;"
                    title="${t.category === 'inspection' ? 'Inspection' : 'Permit'}: ${t.title}">
              <svg width="24" height="24" viewBox="0 0 24 24">
                <polygon points="12,2 22,12 12,22 2,12" fill="${t.lifecycle === 'accepted' ? '#16a34a' : '#a855f7'}" stroke="white" stroke-width="2"/>
                <text x="12" y="16" text-anchor="middle" fill="white" font-size="11" font-weight="bold">${t.category === 'inspection' ? 'I' : 'P'}</text>
              </svg>
            </button>`;
          // Не рисуем actual-bar для milestone, только ромб
          actualHTML = '';
        }

        // Plan/Actual label сверху бара
        const labelHTML = !isPunch && plan ? `
          <div class="absolute text-[9px] font-medium text-slate-500 dark:text-slate-400 tabnum"
               style="left:${plan.left}px; top:2px;">
            ${fmtTime(t.estMinutes)} план${t.actualMinutes > 0 ? ` · ${fmtTime(t.actualMinutes)} факт ${planVar}` : ''}
          </div>` : '';

        // Dependency arrows из этой задачи к зависимым (FS — finish→start)
        const depsHTML = timelineState.showDeps ? (t.dependsOn || []).map(depId => {
          const dep = T(depId);
          if (!dep || !dep.plannedStartAt) return '';
          const depPlan = calcPlan(dep);
          if (!depPlan) return '';
          const x1 = depPlan.end;
          const y1 = -8;
          const x2 = plan ? plan.left : 0;
          const y2 = (rowHeight - 14) / 2 + 7;
          const isCriticalDep = dep.isCriticalPath && t.isCriticalPath;
          const stroke = isCriticalDep ? '#f43f5e' : 'rgba(99,102,241,0.6)';
          return `
            <svg class="pointer-events-none absolute top-0 left-0 z-0 overflow-visible" width="${totalWidth}" height="${rowHeight}">
              <path d="M ${x1} ${y1} L ${x1 + 8} ${y1} L ${x1 + 8} ${y2} L ${x2 - 4} ${y2}" stroke="${stroke}" stroke-width="1.4" fill="none" stroke-dasharray="3,2" />
              <polygon points="${x2-4},${y2-3} ${x2},${y2} ${x2-4},${y2+3}" fill="${stroke}" />
            </svg>`;
        }).join('') : '';

        return `
          <div class="flex items-stretch border-b border-slate-100 transition-colors hover:bg-slate-50 dark:border-slate-800 dark:hover:bg-slate-800/40 ${isPunch ? 'bg-slate-50/40 dark:bg-slate-900/40' : ''}">
            <div class="w-72 shrink-0 border-r border-slate-200 px-3 py-2 dark:border-slate-800">
              <div class="flex items-center gap-2">
                ${renderPriorityDot(t.priority)}
                ${isMilestone ? `<i data-lucide="diamond" class="h-3 w-3 text-purple-500"></i>` : ''}
                ${isPunch ? `<span class="rounded bg-orange-100 px-1 text-[8px] font-bold uppercase text-orange-700 dark:bg-orange-950 dark:text-orange-300">PUNCH</span>` : ''}
                <button onclick="openDrawer('${t.id}')" class="truncate text-left text-[12px] font-medium text-slate-800 hover:text-indigo-600 dark:text-slate-200 dark:hover:text-indigo-400">${t.title}</button>
                ${t.isCriticalPath ? '<span class="rounded bg-rose-100 px-1 text-[8px] font-bold uppercase text-rose-700 dark:bg-rose-950 dark:text-rose-300">CP</span>' : ''}
              </div>
              <div class="mt-0.5 flex items-center gap-2 text-[10px] text-slate-500">
                ${renderAvatar(t.assignee, 'h-4 w-4 text-[8px]')}
                <span>${W(t.assignee)?.name.split(' ')[0]}</span>
                ${t.timerRunning ? '<span class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></span>' : ''}
                ${isOver ? '<span class="rounded bg-rose-100 px-1 text-[9px] font-bold text-rose-700 dark:bg-rose-950 dark:text-rose-300">OVERDUE</span>' : ''}
                <span class="ml-auto tabnum">${fmtTime(t.estMinutes)}</span>
              </div>
            </div>
            <div class="relative flex-1" style="min-width: ${totalWidth}px; height: ${rowHeight}px;">
              <!-- Background grid -->
              ${days.map((d, i) => `<div class="absolute top-0 bottom-0 border-r ${d.isToday ? 'bg-indigo-50/50 dark:bg-indigo-950/30' : ''} border-slate-100 dark:border-slate-800" style="left:${i*dayWidth}px; width:${dayWidth}px"></div>`).join('')}
              <!-- Today line (vertical) -->
              <div class="absolute top-0 bottom-0 z-20 w-0.5 bg-rose-500" style="left:${todayLeft}px"></div>
              ${labelHTML}
              ${baselineHTML}
              ${savedZoneHTML}
              ${actualHTML}
              ${milestoneHTML}
              ${depsHTML}
            </div>
          </div>`;
      };

      // ─── Render каждой группы
      let groupRowsHTML = '';
      Object.entries(grouped).forEach(([groupKey, tasks]) => {
        // Group header row (только если group != 'none' и есть имя)
        if (groupKey) {
          const cpCount = tasks.filter(t => t.isCriticalPath).length;
          groupRowsHTML += `
            <div class="flex items-center border-b border-slate-200 bg-slate-50 dark:border-slate-800 dark:bg-slate-900/60">
              <div class="w-72 shrink-0 border-r border-slate-200 px-3 py-2 dark:border-slate-800">
                <div class="flex items-center gap-2 text-xs font-bold uppercase tracking-wide text-indigo-600 dark:text-indigo-400">
                  <i data-lucide="${timelineState.groupBy === 'crew' ? 'user' : timelineState.groupBy === 'phase' ? 'layers' : 'briefcase'}" class="h-3.5 w-3.5"></i>
                  <span>${groupKey}</span>
                </div>
                <div class="mt-0.5 text-[10px] text-slate-500">${tasks.length} задач${cpCount > 0 ? ` · ${cpCount} CP` : ''}</div>
              </div>
              <div class="flex-1 px-2 text-[11px] text-slate-500"></div>
            </div>`;
        }
        // Сначала обычные tasks, в конце — punch (compact mode)
        const sorted = [...tasks].sort((a, b) => {
          if (a.category === 'punch' && b.category !== 'punch') return 1;
          if (b.category === 'punch' && a.category !== 'punch') return -1;
          return new Date(a.plannedStartAt) - new Date(b.plannedStartAt);
        });
        sorted.forEach(t => { groupRowsHTML += renderTaskRow(t); });
      });

      const toolbar = `
        <div class="mb-3 flex flex-wrap items-center gap-3">
          <h2 class="text-xl font-bold">Timeline <span class="text-sm font-normal text-slate-500">— Construction Gantt: план vs факт</span></h2>

          <div class="ml-auto flex flex-wrap items-center gap-1.5">
            <button onclick="timelineState.showBaseline=!timelineState.showBaseline; renderView();"
                    class="inline-flex items-center gap-1 rounded-lg border ${timelineState.showBaseline ? 'border-slate-400 bg-slate-100 text-slate-700 dark:border-slate-500 dark:bg-slate-700 dark:text-slate-200' : 'border-slate-200 bg-white text-slate-500 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-400'} px-2.5 py-1 text-xs font-medium">
              <i data-lucide="line-chart" class="h-3 w-3"></i> Baseline (план)
            </button>
            <button onclick="timelineState.showCritical=!timelineState.showCritical; renderView();"
                    class="inline-flex items-center gap-1 rounded-lg border ${timelineState.showCritical ? 'border-rose-400 bg-rose-50 text-rose-700 dark:border-rose-700 dark:bg-rose-950 dark:text-rose-300' : 'border-slate-200 bg-white text-slate-700 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300'} px-2.5 py-1 text-xs font-medium">
              <i data-lucide="zap" class="h-3 w-3"></i> Critical Path
            </button>
            <button onclick="timelineState.showDeps=!timelineState.showDeps; renderView();"
                    class="inline-flex items-center gap-1 rounded-lg border ${timelineState.showDeps ? 'border-indigo-400 bg-indigo-50 text-indigo-700 dark:border-indigo-700 dark:bg-indigo-950 dark:text-indigo-300' : 'border-slate-200 bg-white text-slate-700 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300'} px-2.5 py-1 text-xs font-medium">
              <i data-lucide="link" class="h-3 w-3"></i> Dependencies
            </button>

            <select onchange="timelineState.groupBy=this.value; renderView();"
                    class="rounded-lg border border-slate-200 bg-white px-2 py-1 text-xs dark:border-slate-700 dark:bg-slate-900">
              <option value="none"${timelineState.groupBy==='none'?' selected':''}>Group: none</option>
              <option value="project"${timelineState.groupBy==='project'?' selected':''}>Group: project</option>
              <option value="crew"${timelineState.groupBy==='crew'?' selected':''}>Group: crew</option>
              <option value="phase"${timelineState.groupBy==='phase'?' selected':''}>Group: phase</option>
            </select>

            <div class="inline-flex rounded-lg border border-slate-200 bg-white p-1 text-xs dark:border-slate-700 dark:bg-slate-900">
              <button class="rounded-md px-3 py-1 text-slate-600 hover:bg-slate-100">День</button>
              <button class="rounded-md bg-indigo-600 px-3 py-1 font-medium text-white">Неделя</button>
              <button class="rounded-md px-3 py-1 text-slate-600 hover:bg-slate-100">Месяц</button>
            </div>
          </div>
        </div>

        <!-- Legend: plan-vs-actual анатомия -->
        <div class="mb-3 grid grid-cols-1 gap-2 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-[11px] dark:border-slate-700 dark:bg-slate-800 sm:grid-cols-3 lg:grid-cols-6">
          <span class="inline-flex items-center gap-1.5 text-slate-700 dark:text-slate-300">
            <svg width="36" height="14"><rect x="0" y="4" width="36" height="6" fill="#cbd5e1" rx="2"/></svg>
            Baseline (план)
          </span>
          <span class="inline-flex items-center gap-1.5 text-slate-700 dark:text-slate-300">
            <svg width="36" height="14"><rect x="0" y="0" width="36" height="14" fill="#10b981" rx="2"/></svg>
            Actual (факт)
          </span>
          <span class="inline-flex items-center gap-1.5 text-slate-700 dark:text-slate-300">
            <svg width="36" height="14"><rect x="0" y="0" width="36" height="14" fill="url(#stripesPattern)" rx="2"/><defs><pattern id="stripesPattern" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="3" height="6" fill="#f43f5e"/></pattern></defs></svg>
            Overdue (просрочка)
          </span>
          <span class="inline-flex items-center gap-1.5 text-slate-700 dark:text-slate-300">
            <svg width="36" height="14"><rect x="0" y="4" width="36" height="6" fill="rgba(16,185,129,0.3)" rx="2" stroke="#10b981" stroke-dasharray="2,1"/></svg>
            Saved time (сэкономлено)
          </span>
          <span class="inline-flex items-center gap-1.5 text-slate-700 dark:text-slate-300">
            <svg width="20" height="14"><polygon points="10,1 19,7 10,13 1,7" fill="#a855f7"/></svg>
            Milestone (permit/inspection)
          </span>
          <span class="inline-flex items-center gap-1.5 text-slate-700 dark:text-slate-300">
            <i data-lucide="cloud-rain" class="h-3.5 w-3.5 text-sky-500"></i> Погода (риск)
          </span>
        </div>`;

      return `
        ${toolbar}
        <div class="overflow-x-auto rounded-xl border border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900 scroll-thin">
          ${dateHeader}
          ${groupRowsHTML}
        </div>`;
    }

    // ─── GRAPH VIEW (DAG зависимостей) ──────────────────────────────
    // State: pan/zoom + filters
    let graphState = {
      zoom:    1,
      panX:    0,
      panY:    0,
      showCritical: true,
      showDeps:     true,
      onlyBlocked:  false,
      projectFilter:'__all__',
    };

    function renderGraph() {
      // Берём задачи которые в графе (с заданными координатами)
      const NODE_W = 180, NODE_H = 88;
      const CANVAS_W = 1180, CANVAS_H = 600;

      // Фильтрация
      let nodes = TASKS.filter(t => typeof t.graphX === 'number' && t.lifecycle !== 'cancelled');
      if (graphState.projectFilter !== '__all__') {
        nodes = nodes.filter(t => `${t.client} · ${t.project}` === graphState.projectFilter);
      }
      if (graphState.onlyBlocked) {
        // оставить заблокированные + всё что они блокируют + от чего зависят
        const blockedIds = new Set(nodes.filter(t => t.lifecycle === 'blocked').map(t => t.id));
        nodes.forEach(t => {
          (t.dependsOn || []).forEach(id => { if (blockedIds.has(t.id)) blockedIds.add(id); });
        });
        nodes = nodes.filter(t => blockedIds.has(t.id));
      }
      const visibleIds = new Set(nodes.map(t => t.id));

      // Edges (стрелки)
      const edges = [];
      nodes.forEach(t => {
        (t.dependsOn || []).forEach(depId => {
          const dep = T(depId);
          if (!dep || !visibleIds.has(depId)) return;
          edges.push({
            from: dep, to: t,
            type: t.depType || 'FS',
            lag: t.lag || 0,
            isCritical: dep.isCriticalPath && t.isCriticalPath,
          });
        });
      });

      // Render одного узла
      const renderGraphNode = (t) => {
        const lcDot = LC_COLORS[t.lifecycle].dot;
        const lcText = LC_COLORS[t.lifecycle].label;
        const lcBorderColor = {
          draft:'#94a3b8', ready:'#3b82f6', started:'#10b981',
          blocked:'#f59e0b', completed:'#8b5cf6', accepted:'#16a34a'
        }[t.lifecycle] || '#94a3b8';
        const cpClass = t.isCriticalPath && graphState.showCritical ? 'critical' : '';
        const dimClass = (graphState.onlyBlocked && t.lifecycle !== 'blocked') ? 'dim' : '';

        return `
          <div class="graph-node absolute cursor-pointer rounded-lg bg-white p-2 shadow-md dark:bg-slate-900 ${cpClass} ${dimClass}"
               style="left:${t.graphX}px; top:${t.graphY}px; width:${NODE_W}px; height:${NODE_H}px; border:2px solid ${lcBorderColor};"
               onclick="openDrawer('${t.id}')"
               data-graph-node="${t.id}"
               title="${lcText}">
            <div class="mb-1 flex items-center gap-1.5 text-[10px]">
              <span class="inline-flex items-center gap-1 rounded px-1.5 py-0.5 font-semibold ${LC_COLORS[t.lifecycle].bg} ${LC_COLORS[t.lifecycle].text}">
                <span class="h-1.5 w-1.5 rounded-full ${lcDot}"></span>${lcText}
              </span>
              ${renderPriorityDot(t.priority)}
              ${t.isCriticalPath ? '<span class="ml-auto rounded bg-rose-100 px-1 text-[8px] font-bold uppercase text-rose-700 dark:bg-rose-950 dark:text-rose-300">CP</span>' : ''}
            </div>
            <div class="line-clamp-2 text-[12px] font-semibold leading-snug text-slate-900 dark:text-slate-100">${t.title}</div>
            <div class="mt-1 flex items-center gap-1.5 text-[10px] text-slate-500">
              ${renderAvatar(t.assignee, 'h-4 w-4 text-[8px]')}
              <span class="truncate">${W(t.assignee)?.name.split(' ')[0] || '—'}</span>
              <span class="ml-auto inline-flex items-center gap-0.5 tabnum"><i data-lucide="clock-3" class="h-2.5 w-2.5"></i>${fmtTime(t.estMinutes)}</span>
            </div>
          </div>`;
      };

      // Render одной стрелки (SVG path с marker)
      const renderEdge = (e, idx) => {
        const fromX = e.from.graphX + NODE_W;
        const fromY = e.from.graphY + NODE_H/2;
        const toX   = e.to.graphX;
        const toY   = e.to.graphY + NODE_H/2;
        // S-curve через cubic bezier
        const midX  = (fromX + toX) / 2;
        const path  = `M ${fromX} ${fromY} C ${midX} ${fromY}, ${midX} ${toY}, ${toX} ${toY}`;
        const stroke = e.isCritical ? '#f43f5e' : '#94a3b8';
        const strokeWidth = e.isCritical ? 2.2 : 1.4;
        const dashArr = e.type === 'SS' ? '5,3' : e.type === 'FF' ? '2,3' : '0';
        const labelX = midX, labelY = (fromY + toY) / 2 - 6;
        const labelTxt = `${e.type}${e.lag ? '+' + e.lag + 'h' : ''}`;
        const arrowId = e.isCritical ? 'arr-critical' : 'arr-normal';
        return `
          <path d="${path}" stroke="${stroke}" stroke-width="${strokeWidth}" fill="none"
                stroke-dasharray="${dashArr}" marker-end="url(#${arrowId})" />
          <rect x="${labelX-16}" y="${labelY-8}" width="32" height="14" rx="3" fill="${e.isCritical ? '#fff1f2' : '#f8fafc'}" stroke="${stroke}" stroke-width="0.6" />
          <text x="${labelX}" y="${labelY+2}" font-size="9" font-weight="600" text-anchor="middle"
                fill="${e.isCritical ? '#9f1239' : '#475569'}" font-family="ui-monospace,monospace">${labelTxt}</text>
        `;
      };

      // SVG defs (markers)
      const svgDefs = `
        <defs>
          <marker id="arr-normal" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
            <polygon points="0 0, 9 4, 0 8" fill="#94a3b8"/>
          </marker>
          <marker id="arr-critical" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
            <polygon points="0 0, 9 4, 0 8" fill="#f43f5e"/>
          </marker>
        </defs>`;

      // Mini-map (downscaled overview справа внизу)
      const MINIMAP_W = 130, MINIMAP_H = 90;
      const mScale = Math.min(MINIMAP_W / CANVAS_W, MINIMAP_H / CANVAS_H);
      const minimapNodes = nodes.map(t => `
        <rect x="${t.graphX * mScale}" y="${t.graphY * mScale}"
              width="${NODE_W * mScale}" height="${NODE_H * mScale}"
              fill="${t.isCriticalPath ? 'rgba(244,63,94,0.7)' : 'rgba(99,102,241,0.5)'}"
              rx="1.5"/>`).join('');

      // Project filter dropdown options
      const projectOpts = [...new Set(TASKS.map(t => `${t.client} · ${t.project}`))].sort();
      const projectFilterHTML = `
        <select onchange="graphState.projectFilter=this.value; renderView();"
                class="rounded-lg border border-slate-200 bg-white px-2 py-1 text-xs dark:border-slate-700 dark:bg-slate-900">
          <option value="__all__"${graphState.projectFilter==='__all__'?' selected':''}>Все проекты</option>
          ${projectOpts.map(p => `<option value="${p}"${graphState.projectFilter===p?' selected':''}>${p}</option>`).join('')}
        </select>`;

      const toolbar = `
        <div class="mb-3 flex flex-wrap items-center gap-2">

    // Graph interactivity (pan + zoom)
    function initGraphInteractions() {
      const vp = document.getElementById('graphViewport');
      const canvas = document.getElementById('graphCanvas');
      if (!vp || !canvas) return;

      // Wheel zoom
      vp.addEventListener('wheel', (e) => {
        if (!e.ctrlKey && !e.metaKey && Math.abs(e.deltaY) < 30) return;  // не мешать прокрутке страницы
        e.preventDefault();
        const delta = -e.deltaY * 0.0015;
        graphState.zoom = Math.min(2, Math.max(0.4, graphState.zoom + delta));
        applyGraphTransform();
      }, { passive: false });

      // Drag pan
      let dragging = false, lastX = 0, lastY = 0;
      vp.addEventListener('pointerdown', (e) => {
        if (e.target.closest('.graph-node') || e.target.closest('button') || e.target.closest('select')) return;
        dragging = true; lastX = e.clientX; lastY = e.clientY;
        vp.style.cursor = 'grabbing';
        vp.setPointerCapture(e.pointerId);
      });
      vp.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const dx = e.clientX - lastX, dy = e.clientY - lastY;
        graphState.panX += dx; graphState.panY += dy;
        lastX = e.clientX; lastY = e.clientY;
        applyGraphTransform();
      });
      vp.addEventListener('pointerup', () => { dragging = false; vp.style.cursor = 'grab'; });
      vp.addEventListener('pointerleave', () => { dragging = false; vp.style.cursor = 'grab'; });
    }
    function applyGraphTransform() {
      const canvas = document.getElementById('graphCanvas');
      if (!canvas) return;
      canvas.style.transform = `translate(${graphState.panX}px, ${graphState.panY}px) scale(${graphState.zoom})`;
    }
    function graphZoom(delta) {
      graphState.zoom = Math.min(2, Math.max(0.4, graphState.zoom + delta));
      applyGraphTransform();
      // обновляем zoom indicator (проще перерисовать всё)
      renderView();
    }
    function graphReset() {
      graphState.zoom = 1;
      graphState.panX = 0;
      graphState.panY = 0;
      renderView();
    }

                  <strong>Hours:</strong> ${fmtTime(s.estMinutes)}${s.actualMinutes>0?' / '+fmtTime(s.actualMinutes):''} ·
                  <strong>Cost:</strong> ${fmtMoney(s.costInternal)} → ${fmtMoney(s.priceClient)}
                </p>
                ${renderMd(sw.contentMd)}
                ${s.acceptance ? `<p><strong>Акт подписан:</strong> ${s.acceptance.signedBy} · ${fmtDateShort(s.acceptance.signedAt)}</p>` : ''}
                <hr/>
              `;
            }).join('') || '<p><em>Нет подзадач у этой задачи.</em></p>'}
            <h2>Итого</h2>
            <ul>
              <li>Подзадач: <strong>${subtasks.length}</strong>, выполнено: <strong>${subDone}</strong></li>
              <li>Общая себестоимость: <strong>${fmtMoney(totalCostInt)}</strong></li>
              <li>Продано клиенту: <strong>${fmtMoney(totalPriceCl)}</strong></li>
              <li>Время план: <strong>${fmtTime(totalPlanMin)}</strong></li>
              <li>Время факт: <strong>${fmtTime(totalActMin)}</strong> (<strong>${pct}%</strong> от плана)</li>
            </ul>
          </div>`;
      };

      const section4 = `
        <section class="border-t border-slate-200 px-5 py-5 dark:border-slate-700">
          <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
            <h2 class="flex items-center gap-2 text-sm font-bold uppercase tracking-wide text-amber-600 dark:text-amber-400">
              <i data-lucide="book-open" class="h-4 w-4"></i> Wiki
              <span class="rounded-full bg-amber-100 px-1.5 py-0.5 text-[9px] font-bold text-amber-700 dark:bg-amber-950 dark:text-amber-300">v${taskWiki.version}</span>
            </h2>
            <div class="flex flex-wrap items-center gap-1.5">
              <!-- Просмотр / Редактирование -->
              <div class="inline-flex rounded-lg border border-slate-200 bg-white p-0.5 text-[10px] dark:border-slate-700 dark:bg-slate-900">
                <button onclick="wikiState.editMode=null; renderDrawerRefresh('${t.id}');"
                        class="rounded-md px-2 py-1 font-medium ${!editMode ? 'bg-amber-500 text-white' : 'text-slate-600 dark:text-slate-400'}">
                  <i data-lucide="eye" class="inline h-3 w-3"></i> Просмотр
                </button>
                <button onclick="wikiState.editMode='${t.id}'; renderDrawerRefresh('${t.id}');"
                        class="rounded-md px-2 py-1 font-medium ${editMode ? 'bg-amber-500 text-white' : 'text-slate-600 dark:text-slate-400'}">
                  <i data-lucide="edit-3" class="inline h-3 w-3"></i> Редакт.
                </button>
              </div>
              <!-- Rollup toggle (только если есть subtasks) -->
              ${subtasks.length > 0 ? `
                <label class="inline-flex cursor-pointer items-center gap-1.5 rounded-lg border ${rollupOn ? 'border-indigo-400 bg-indigo-50 text-indigo-700 dark:border-indigo-700 dark:bg-indigo-950 dark:text-indigo-300' : 'border-slate-200 bg-white text-slate-600 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300'} px-2 py-1 text-[10px] font-medium">
                  <input type="checkbox" ${rollupOn ? 'checked' : ''} class="rounded"
                         onchange="wikiState.rollupExpanded['${t.id}']=this.checked; renderDrawerRefresh('${t.id}');" />
                  С подзадачами (${subtasks.length})
                </label>` : ''}
              <!-- AI / Templates -->
              <button onclick="showAiSuggestToast('AI: предлагает добавить раздел «Permits & inspections» (на основе паттернов с похожих задач Carlos R.)')"
                      class="inline-flex items-center gap-1 rounded-lg bg-gradient-to-r from-violet-500 to-indigo-600 px-2 py-1 text-[10px] font-semibold text-white shadow-sm hover:scale-[1.02]">
                <i data-lucide="sparkles" class="h-3 w-3"></i> AI: Дополни
              </button>
              <button onclick="showAiSuggestToast('Templates library открыта (mock): bathroom remodel, kitchen full reno, permit pickup, demo & disposal...')"
                      class="inline-flex items-center gap-1 rounded-lg border border-slate-200 bg-white px-2 py-1 text-[10px] font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800">
                <i data-lucide="clipboard-list" class="h-3 w-3"></i> Templates
              </button>
            </div>
          </div>

          ${editMode ? `
            <!-- ─── EDIT MODE: split markdown source + preview -->
            <div class="mb-2 flex flex-wrap items-center gap-1 rounded-lg border border-slate-200 bg-slate-50 p-1.5 text-[11px] dark:border-slate-700 dark:bg-slate-800">
              <button class="rounded px-1.5 py-0.5 font-bold hover:bg-white dark:hover:bg-slate-700" title="Bold">B</button>
              <button class="rounded px-1.5 py-0.5 italic hover:bg-white dark:hover:bg-slate-700" title="Italic">I</button>
              <button class="rounded px-1.5 py-0.5 font-bold hover:bg-white dark:hover:bg-slate-700" title="Heading">H</button>
              <span class="mx-1 text-slate-300 dark:text-slate-600">|</span>
              <button class="inline-flex items-center gap-0.5 rounded px-1.5 py-0.5 hover:bg-white dark:hover:bg-slate-700" title="Link"><i data-lucide="link" class="h-3 w-3"></i></button>
              <button class="inline-flex items-center gap-0.5 rounded px-1.5 py-0.5 hover:bg-white dark:hover:bg-slate-700" title="List"><i data-lucide="list" class="h-3 w-3"></i></button>
              <button class="inline-flex items-center gap-0.5 rounded px-1.5 py-0.5 hover:bg-white dark:hover:bg-slate-700" title="Image"><i data-lucide="image" class="h-3 w-3"></i></button>
              <button class="inline-flex items-center gap-0.5 rounded px-1.5 py-0.5 hover:bg-white dark:hover:bg-slate-700" title="Code"><i data-lucide="code" class="h-3 w-3"></i></button>
              <span class="ml-auto text-[10px] text-slate-500">Markdown поддерживается</span>
            </div>
            <div class="grid grid-cols-1 gap-2 lg:grid-cols-2">
              <textarea class="h-72 w-full rounded-lg border border-slate-300 bg-white p-3 font-mono text-[11px] leading-relaxed text-slate-800 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-100 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:focus:ring-indigo-900"
                        spellcheck="false">${taskWiki.contentMd}</textarea>
              <div class="h-72 overflow-y-auto rounded-lg border border-slate-300 bg-white p-3 dark:border-slate-700 dark:bg-slate-800 scroll-thin wiki-md">
                ${renderMd(taskWiki.contentMd)}
              </div>
            </div>
            <div class="mt-2 flex items-center justify-between text-[10px] text-slate-500">
              <span>Last saved 2s ago by ${taskWiki.lastSavedBy} · <span class="rounded bg-amber-100 px-1.5 py-0.5 font-bold text-amber-700 dark:bg-amber-950 dark:text-amber-300">v${taskWiki.version}</span></span>
              <button onclick="wikiState.editMode=null; showAiSuggestToast('Wiki сохранён v${taskWiki.version + 1}'); renderDrawerRefresh('${t.id}');"
                      class="rounded-md bg-emerald-600 px-3 py-1.5 text-[11px] font-semibold text-white hover:bg-emerald-700">
                <i data-lucide="check" class="inline h-3 w-3"></i> Сохранить
              </button>
            </div>
          ` : `
            <!-- ─── VIEW MODE -->
            <div class="rounded-lg border ${rollupOn ? 'border-indigo-300 bg-indigo-50/30 dark:border-indigo-800 dark:bg-indigo-950/30' : 'border-slate-200 bg-slate-50/50 dark:border-slate-700 dark:bg-slate-800/50'} p-4">
              ${rollupOn ? renderRollup() : `<div class="wiki-md">${renderMd(taskWiki.contentMd)}</div>`}
            </div>

            ${rollupOn ? `
              <!-- Export buttons (rolled-up only) -->
              <div class="mt-3 flex flex-wrap gap-1.5">
                <button onclick="showAiSuggestToast('PDF экспорт: ${t.title.replace(/'/g, '')}-rollup.pdf (mock)')"
                        class="inline-flex items-center gap-1 rounded-lg border border-rose-200 bg-rose-50 px-2.5 py-1 text-[11px] font-medium text-rose-700 hover:bg-rose-100 dark:border-rose-800 dark:bg-rose-950 dark:text-rose-300">
                  <i data-lucide="file-text" class="h-3 w-3"></i> PDF
                </button>
                <button onclick="showAiSuggestToast('Word экспорт: ${t.title.replace(/'/g, '')}-rollup.docx (mock)')"
                        class="inline-flex items-center gap-1 rounded-lg border border-blue-200 bg-blue-50 px-2.5 py-1 text-[11px] font-medium text-blue-700 hover:bg-blue-100 dark:border-blue-800 dark:bg-blue-950 dark:text-blue-300">
                  <i data-lucide="file" class="h-3 w-3"></i> Word
                </button>
                <button onclick="showAiSuggestToast('Markdown скопирован в буфер обмена (mock)')"
                        class="inline-flex items-center gap-1 rounded-lg border border-slate-200 bg-white px-2.5 py-1 text-[11px] font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800">
                  <i data-lucide="file-code" class="h-3 w-3"></i> Markdown
                </button>
                <button onclick="showAiSuggestToast('Открываю форму подписи акта по проекту…')"
                        class="ml-auto inline-flex items-center gap-1 rounded-lg bg-emerald-600 px-2.5 py-1 text-[11px] font-semibold text-white hover:bg-emerald-700">
                  <i data-lucide="file-signature" class="h-3 w-3"></i> К акту
                </button>
              </div>` : ''}

            <!-- Версии (collapsible) -->
            <details class="mt-3 rounded-lg border border-slate-200 dark:border-slate-700">
              <summary class="cursor-pointer select-none list-none px-3 py-2 text-[11px] font-semibold hover:bg-slate-50 dark:hover:bg-slate-800">
                <i data-lucide="git-commit" class="inline h-3 w-3"></i> Версии (5 последних)
              </summary>
              <div class="border-t border-slate-200 px-3 py-2 dark:border-slate-700">
                ${[
                  { v: taskWiki.version,     who: taskWiki.lastSavedBy, ts: '25 Apr 15:48', diff: '+12 / −3' },
                  { v: taskWiki.version - 1, who: 'Сергей П.',  ts: '23 Apr 09:12', diff: '+5 / −1' },
                  { v: taskWiki.version - 2, who: 'AI assist',  ts: '21 Apr 14:30', diff: '+24 / 0' },
                  { v: taskWiki.version - 3, who: 'PM Денис',   ts: '20 Apr 10:00', diff: '+8 / −2' },
                  { v: taskWiki.version - 4, who: 'Vasya K.',   ts: '18 Apr 16:44', diff: '+15 / −0' },
                ].filter(v => v.v > 0).map(v => `
                  <div class="flex items-center gap-2 py-1 text-[11px]">
                    <span class="rounded bg-amber-100 px-1.5 py-0.5 font-bold text-amber-700 dark:bg-amber-950 dark:text-amber-300 tabnum">v${v.v}</span>
                    <span class="text-slate-700 dark:text-slate-300">${v.who}</span>
                    <span class="text-slate-500">·</span>
                    <span class="text-slate-500 tabnum">${v.ts}</span>
                    <span class="ml-auto font-mono text-[10px] text-slate-500">${v.diff}</span>
                    <button class="rounded text-indigo-600 hover:underline dark:text-indigo-400">diff</button>
                  </div>`).join('')}
              </div>
            </details>

            <!-- Attachments -->
            ${(taskWiki.attachments && taskWiki.attachments.length > 0) ? `
              <div class="mt-3">
                <h3 class="mb-1.5 text-[11px] font-bold uppercase tracking-wide text-slate-500">Вложения (${taskWiki.attachments.length})</h3>
                <div class="grid grid-cols-2 gap-2 sm:grid-cols-3">
                  ${taskWiki.attachments.map(a => `
                    <div class="flex items-center gap-2 rounded-lg border border-slate-200 bg-white p-2 dark:border-slate-700 dark:bg-slate-800">
                      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded bg-gradient-to-br from-indigo-100 to-violet-100 text-indigo-600 dark:from-indigo-950 dark:to-violet-950 dark:text-indigo-400">
                        <i data-lucide="${a.name.endsWith('.pdf') ? 'file-text' : a.name.match(/\\.(jpg|png|jpeg)$/) ? 'image' : 'file'}" class="h-4 w-4"></i>
                      </div>
                      <div class="min-w-0 flex-1">
                        <div class="truncate text-[11px] font-medium text-slate-800 dark:text-slate-200">${a.name}</div>
                        <div class="text-[10px] text-slate-500">${a.size}</div>
                      </div>
                      <button class="rounded p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-slate-700"><i data-lucide="download" class="h-3.5 w-3.5"></i></button>
                    </div>`).join('')}
                </div>
              </div>` : ''}

            <div class="mt-3 text-[10px] text-slate-500">
              Last saved <span class="font-medium">${fmtDateShort(taskWiki.lastSavedAt)}</span> by <span class="font-medium">${taskWiki.lastSavedBy}</span>
            </div>
          `}
        </section>`;

      return header + section1 + section2 + section3 + section4;
    }

    // ─── Init ───────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      // Восстановить тему
      try {
        const saved = localStorage.getItem('tt-theme');
        if (saved === 'dark') document.documentElement.classList.add('dark');
        else if (saved === 'light') document.documentElement.classList.remove('dark');
        else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
      } catch (e) {}

      renderTabs();
      renderView();
    });

    // Hotkey: ESC закрывает drawer
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDrawer();
      // Cmd/Ctrl + K — фокус в поиск
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        const input = document.querySelector('header input[type="text"]');
        if (input) input.focus();
      }
    });
  </script>
